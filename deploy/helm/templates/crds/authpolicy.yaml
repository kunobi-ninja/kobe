apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: authpolicies.kunobi.ninja
spec:
  group: kunobi.ninja
  names:
    kind: AuthPolicy
    plural: authpolicies
    singular: authpolicy
    shortNames:
      - ap
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["name", "issuer", "roleExtraction", "policies"]
              properties:
                name:
                  type: string
                  description: "Human-readable name for this provider (used as prefix in requester_type)"
                issuer:
                  type: string
                  description: "OIDC issuer URL (must match the iss claim)"
                jwksUrl:
                  type: string
                  description: "JWKS URL (defaults to {issuer}/.well-known/jwks.json)"
                audience:
                  type: array
                  items:
                    type: string
                  description: "Expected aud claim values (empty = skip)"
                authorizedParties:
                  type: array
                  items:
                    type: string
                  description: "Expected azp values (empty = skip)"
                algorithms:
                  type: array
                  items:
                    type: string
                  default: ["RS256"]
                  description: "Allowed JWT signing algorithms"
                identityTemplate:
                  type: string
                  default: "{sub}"
                  description: "Template for identity string using {claim} placeholders"
                roleExtraction:
                  type: object
                  required: ["method"]
                  properties:
                    method:
                      type: string
                      enum: ["static", "claim", "mapping", "conditional"]
                    role:
                      type: string
                      description: "Role name (for static method)"
                    claim:
                      type: string
                      description: "Claim path (for claim/mapping methods)"
                    default:
                      type: string
                      description: "Fallback role"
                    values:
                      type: object
                      additionalProperties:
                        type: string
                      description: "Claim value to role mapping"
                    rules:
                      type: array
                      items:
                        type: object
                        required: ["claim", "value", "role"]
                        properties:
                          claim:
                            type: string
                          value:
                            type: string
                          role:
                            type: string
                      description: "Conditional rules (first match wins)"
                  x-kubernetes-preserve-unknown-fields: true
                policies:
                  type: object
                  additionalProperties:
                    type: object
                    required: ["allowedProfiles", "maxTtl", "maxConcurrentClaims"]
                    properties:
                      allowedProfiles:
                        type: array
                        items:
                          type: string
                      maxTtl:
                        type: string
                      maxConcurrentClaims:
                        type: integer
                      defaultPriority:
                        type: integer
                        default: 50
                      maxExtensions:
                        type: integer
                        default: 2
                  description: "Per-role authorization policies"
      additionalPrinterColumns:
        - name: Provider
          type: string
          jsonPath: .spec.name
        - name: Issuer
          type: string
          jsonPath: .spec.issuer
