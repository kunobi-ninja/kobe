apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clusterpoolprofiles.kobe.kunobi.ninja
spec:
  group: kobe.kunobi.ninja
  names:
    kind: ClusterPoolProfile
    plural: clusterpoolprofiles
    singular: clusterpoolprofile
    shortNames:
      - cpp
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["cluster"]
              properties:
                poolSize:
                  type: integer
                  default: 3
                ttl:
                  type: string
                  default: "2h"
                cluster:
                  type: object
                  required: ["version"]
                  properties:
                    mode:
                      type: string
                      default: "shared"
                      enum: ["shared", "virtual"]
                    version:
                      type: string
                    servers:
                      type: integer
                      default: 1
                    serverArgs:
                      type: array
                      items:
                        type: string
                    persistence:
                      type: object
                      properties:
                        storageType:
                          type: string
                        storageClassName:
                          type: string
                        storageRequestSize:
                          type: string
                    expose:
                      type: object
                      properties:
                        exposeType:
                          type: string
                          enum: ["ingress", "NodePort", "LoadBalancer"]
                        ingressClassName:
                          type: string
                        nodePort:
                          type: integer
                addons:
                  type: array
                  items:
                    type: object
                    required: ["name"]
                    properties:
                      name:
                        type: string
                      manifest:
                        type: string
                      url:
                        type: string
                resources:
                  type: object
                  properties:
                    limits:
                      type: object
                      additionalProperties:
                        type: string
                    requests:
                      type: object
                      additionalProperties:
                        type: string
                healthCheck:
                  type: object
                  properties:
                    intervalSeconds:
                      type: integer
                      default: 30
                    failureThreshold:
                      type: integer
                      default: 3
                readinessGates:
                  type: array
                  items:
                    type: object
                    required: ["type"]
                    properties:
                      type:
                        type: string
                        enum: ["CRDExists", "DeploymentReady", "DaemonSetReady", "URLHealthy"]
                      name:
                        type: string
                      namespace:
                        type: string
                      url:
                        type: string
                scaling:
                  type: object
                  properties:
                    minReady:
                      type: integer
                      default: 1
                    maxClusters:
                      type: integer
                      default: 8
                    scaleUpThreshold:
                      type: integer
                      default: 0
                    scaleDownAfter:
                      type: string
                      default: "30m"
                    queueTimeout:
                      type: string
                      default: "5m"
                diagnostics:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    storage:
                      type: string
                    retentionDays:
                      type: integer
                      default: 7
                    logLines:
                      type: integer
                      default: 1000
                    includeSecrets:
                      type: boolean
                      default: false
                snapshot:
                  type: object
                  description: "Velero golden image snapshot configuration."
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    veleroNamespace:
                      type: string
                      default: "velero"
                    storageLocation:
                      type: string
                      default: "default"
                    goldenPrefix:
                      type: string
                      default: "golden"
                    ttl:
                      type: string
                      default: "720h"
                    refreshOn:
                      type: string
                      enum: ["ProfileChange", "Manual"]
                      default: "ProfileChange"
            status:
              type: object
              properties:
                ready:
                  type: integer
                claimed:
                  type: integer
                creating:
                  type: integer
                unhealthy:
                  type: integer
                queueDepth:
                  type: integer
                goldenBackup:
                  type: string
                  description: "Name of the current golden Velero backup."
                goldenGeneration:
                  type: integer
                  format: int64
                  description: "Profile generation the golden backup was created from."
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Ready
          type: integer
          jsonPath: .status.ready
        - name: Claimed
          type: integer
          jsonPath: .status.claimed
        - name: Creating
          type: integer
          jsonPath: .status.creating
