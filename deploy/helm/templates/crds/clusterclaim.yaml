apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clusterclaims.kunobi.ninja
spec:
  group: kunobi.ninja
  names:
    kind: ClusterClaim
    plural: clusterclaims
    singular: clusterclaim
    shortNames:
      - cc
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["profileRef", "ttl", "requester"]
              properties:
                profileRef:
                  type: string
                ttl:
                  type: string
                requester:
                  type: object
                  required: ["type", "identity"]
                  properties:
                    type:
                      type: string
                    identity:
                      type: string
                priority:
                  type: integer
                  default: 50
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: ["Pending", "Bound", "Released", "Expired", "Recycling"]
                clusterName:
                  type: string
                boundAt:
                  type: string
                expiresAt:
                  type: string
                queuePosition:
                  type: integer
                diagnosticsUrl:
                  type: string
                extensionsCount:
                  type: integer
                maxExtensions:
                  type: integer
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Profile
          type: string
          jsonPath: .spec.profileRef
        - name: Cluster
          type: string
          jsonPath: .status.clusterName
        - name: Expires
          type: string
          jsonPath: .status.expiresAt
