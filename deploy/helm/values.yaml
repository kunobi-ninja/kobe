replicaCount: 1

image:
  repository: ghcr.io/zondax/kunobi-pool-operator
  tag: ""  # defaults to Chart.appVersion
  pullPolicy: IfNotPresent

namespace: kunobi-pool

# Shared PostgreSQL datastore for direct-k3s backends.
# When enabled, direct-k3s clusters use a shared PostgreSQL instance
# (via kine) instead of embedded SQLite.
postgres:
  enabled: false
  # Name of a Secret containing the connection URL.
  secretName: kunobi-postgres
  # Key in the Secret that holds the URL (postgres://user:pass@host/db).
  secretKey: connection-url

# S3 for diagnostic bundles
diagnostics:
  enabled: false
  # AWS credentials via env vars or IRSA
  # storage: s3://kunobi-diagnostics/

# Resource limits for the operator pod
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Service configuration
service:
  type: ClusterIP
  port: 8080

# Ingress for external access
ingress:
  enabled: false
  className: nginx
  host: pool.kunobi.ninja
  tls:
    enabled: true
    secretName: pool-kunobi-tls

serviceAccount:
  create: true
  name: kunobi-pool-operator
