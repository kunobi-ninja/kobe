apiVersion: kobe.kunobi.ninja/v1alpha1
kind: AccessPolicy
metadata:
  name: clerk
  namespace: kunobi-pool
spec:
  auth:
    oidc:
      issuer: https://clerk.kunobi.ninja
      authorizedParties: ["https://app.kunobi.ninja"]
      algorithms: ["RS256"]
  identity: "{sub}"
  rules:
    - match:
        claim: org_role
        value: "org:admin"
      pools: ["*"]
      maxTtl: "8h"
      maxConcurrentLeases: 10
      maxExtensions: 10
    - match:
        claim: private_metadata.role
        value: admin
      pools: ["*"]
      maxTtl: "8h"
      maxConcurrentLeases: 10
      maxExtensions: 10
    - pools: ["dev-*"]
      maxTtl: "4h"
      maxConcurrentLeases: 2
      maxExtensions: 5
