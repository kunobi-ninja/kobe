apiVersion: kunobi.ninja/v1alpha1
kind: AuthPolicy
metadata:
  name: clerk
  namespace: kunobi-pool
spec:
  name: clerk
  issuer: https://clerk.kunobi.ninja
  audience: []
  authorizedParties: ["https://app.kunobi.ninja"]
  algorithms: ["RS256"]
  identityTemplate: "{sub}"
  roleExtraction:
    method: conditional
    rules:
      - claim: org_role
        value: "org:admin"
        role: admin
      - claim: private_metadata.role
        value: admin
        role: admin
    default: user
  policies:
    admin:
      allowedProfiles: ["*"]
      maxTtl: "8h"
      maxConcurrentClaims: 10
      defaultPriority: 100
      maxExtensions: 10
    user:
      allowedProfiles: ["dev-*"]
      maxTtl: "4h"
      maxConcurrentClaims: 2
      defaultPriority: 50
      maxExtensions: 5
