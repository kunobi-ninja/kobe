apiVersion: kobe.kunobi.ninja/v1alpha1
kind: AccessPolicy
metadata:
  name: corporate-sso
  namespace: kunobi-pool
spec:
  # Works with Auth0, Okta, Google, Azure AD, Keycloak, etc.
  # Replace with your OIDC provider's issuer URL.
  auth:
    oidc:
      issuer: https://login.example.com
      # Optional: defaults to {issuer}/.well-known/jwks.json
      # jwksUrl: https://login.example.com/.well-known/jwks.json
      audience: ["kunobi-pool"]
      algorithms: ["RS256"]
  identity: "{email}"
  rules:
    - match:
        claim: groups
        value: platform-admins
      pools: ["*"]
      maxTtl: "8h"
      maxConcurrentLeases: 10
      maxExtensions: 10
    - match:
        claim: groups
        value: developers
      pools: ["dev-*"]
      maxTtl: "4h"
      maxConcurrentLeases: 3
      maxExtensions: 5
    - match:
        claim: groups
        value: qa-team
      pools: ["e2e-*", "staging-*"]
      maxTtl: "2h"
      maxConcurrentLeases: 5
      maxExtensions: 3
    - pools: ["sandbox-*"]
      maxTtl: "1h"
      maxConcurrentLeases: 1
      maxExtensions: 1
