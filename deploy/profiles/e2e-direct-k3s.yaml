apiVersion: kobe.kunobi.ninja/v1alpha1
kind: ClusterPool
metadata:
  name: e2e-direct-k3s
  namespace: kunobi-pool
spec:
  size: 2
  ttl: "1h"
  backend:
    type: k3s
    # Shared PostgreSQL datastore (requires postgres.enabled=true in Helm values).
    # When not configured, each k3s cluster uses embedded SQLite.
    datastore:
      secretRef: kunobi-postgres
      secretKey: connection-url
      goldenTemplates: false
  cluster:
    version: "v1.31.3+k3s1"
    servers: 1
    agents: 0
  healthCheck:
    intervalSeconds: 30
    failureThreshold: 3
  scaling:
    minReady: 0
    maxClusters: 4
    scaleUpThreshold: 0
    scaleDownAfter: "5m"
    queueTimeout: "5m"
  resources:
    limits:
      cpu: "1"
      memory: "1Gi"
