apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kunobi-pool-operator
  namespace: kunobi-pool
spec:
  interval: 5m
  chart:
    spec:
      chart: ./deploy/helm
      sourceRef:
        kind: GitRepository
        name: kunobi-k8se2e
      interval: 1m
  values:
    image:
      repository: ghcr.io/zondax/kunobi-pool-operator
      tag: "0.1.0"  # Pin to explicit version; update via CI on release
    auth:
      githubOidcAudience: kunobi-pool
      clerkIssuer: https://clerk.kunobi.ninja
    ingress:
      enabled: true
      host: pool.kunobi.ninja
      tls:
        enabled: true
        secretName: pool-kunobi-tls
