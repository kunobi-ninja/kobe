# Authenticates the kobe HTTP API against your SSH public key. The ${SSH_PUBKEY}
# placeholder is substituted with your ~/.ssh/id_ed25519.pub (via envsubst) when
# ./demo up applies this. kobe accepts Ed25519 keys only.
apiVersion: kobe.kunobi.ninja/v1alpha1
kind: AccessPolicy
metadata:
  name: demo-ssh
  namespace: kobe-system
spec:
  auth:
    ssh:
      authorizedKeys:
        - "${SSH_PUBKEY}"
      revokedKeys: []
  identity: "{fingerprint}"
  rules:
    - pools: ["*"]
      maxTtl: "2h"
      maxConcurrentLeases: 5
      maxExtensions: 3
