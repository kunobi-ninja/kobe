# Warm pool of k3s clusters the tutorial leases from. Applied with kubectl
# after the operator is installed, alongside accesspolicy.yaml.
apiVersion: kobe.kunobi.ninja/v1alpha1
kind: ClusterPool
metadata:
  name: demo-k3s-small
  namespace: kobe-system
spec:
  size: 2
  ttl: "1h"
  backend:
    type: k3s
  cluster:
    version: "v1.31.3+k3s1"
    servers: 1
    # Single-node inner clusters: with agents, two warm server+agent pairs
    # do not fit a 2-vCPU default node.
    agents: 0
    serverArgs:
      - "--disable=traefik"
      - "--disable=metrics-server"
      - "--disable=local-storage"
      - "--kubelet-arg=cgroup-driver=cgroupfs"
      - "--kubelet-arg=cgroups-per-qos=false"
      - "--kubelet-arg=enforce-node-allocatable="
  healthCheck:
    intervalSeconds: 30
    failureThreshold: 5
  scaling:
    minReady: 2
    maxClusters: 3
    scaleUpThreshold: 0
    scaleDownAfter: 30m
    queueTimeout: 5m
  resources:
    # Kubernetes reserves the full limit as the request on every guest pod,
    # so two warm 1-CPU instances can never schedule on a 2-vCPU node.
    # 750m fits two alongside the operator and kube-system.
    limits:
      cpu: "750m"
      memory: 1Gi
