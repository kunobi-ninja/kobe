apiVersion: kobe.kunobi.ninja/v1alpha1
kind: AccessPolicy
metadata:
  name: demo-ssh
  namespace: kobe-system
spec:
  auth:
    ssh:
      authorizedKeys:
        - {{ required "sshPublicKey is required (set via --set sshPublicKey=... or values.yaml)" .Values.sshPublicKey | quote }}
      revokedKeys: []
  identity: "{fingerprint}"
  rules:
    - pools: ["*"]
      maxTtl: {{ .Values.pool.maxTtlPerLease | quote }}
      maxConcurrentLeases: {{ .Values.pool.maxConcurrentLeases }}
      maxExtensions: 3
