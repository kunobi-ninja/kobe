apiVersion: v2
name: kobe-demo
description: Self-contained kobe demo for a fresh Exoscale SKS cluster.
type: application
version: 0.1.0
appVersion: "0.19.1"
keywords:
  - kobe
  - demo
  - exoscale
maintainers:
  - name: Zondax
    url: https://zondax.ch
# The vendored kobe chart .tgz lives in charts/ and is regenerated by
# './demo refresh' when this repo's charts/kobe/ changes. Helm v4 requires
# an explicit dependencies block even for pre-vendored tarballs; the
# `repository: ""` sentinel tells helm not to fetch it.
dependencies:
  - name: kobe
    version: "0.19.1"
    repository: ""
