apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kobe.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kobe.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kobe.fullname" . }}
  labels:
    {{- include "kobe.labels" . | nindent 4 }}
rules:
  # CRD management
  - apiGroups: ["kunobi.ninja"]
    resources:
      - clusterpoolprofiles
      - clusterpoolprofiles/status
      - clusterclaims
      - clusterclaims/status
      - authpolicies
      - datastores
      - datastores/status
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Core resources for virtual cluster lifecycle
  - apiGroups: [""]
    resources: ["services", "configmaps", "secrets", "serviceaccounts", "pods"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # RBAC for kobe-sync sidecars
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Nodes (fake-node syncer)
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update"]
  # CRD discovery (Velero detection)
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kobe.fullname" . }}
  labels:
    {{- include "kobe.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kobe.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "kobe.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
