apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kobe.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kobe.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.poolPublisherServiceAccount | default (printf "%s-pool-publisher" (include "kobe.fullname" .)) }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kobe.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kobe.fullname" . }}
  labels:
    {{- include "kobe.labels" . | nindent 4 }}
rules:
  # CRD management
  - apiGroups: ["kobe.kunobi.ninja"]
    resources:
      - clusterpools
      - clusterpools/status
      - clusterinstances
      - clusterinstances/status
      - clusterleases
      - clusterleases/status
      - accesspolicies
      - bootstrapconfigs
      - kobestores
      - kobestores/status
      - cidrclaims
      - cidrclaims/status
      - cidrpools
      - cidrpools/status
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Core resources for virtual cluster lifecycle
  - apiGroups: [""]
    resources: ["services", "configmaps", "secrets", "serviceaccounts", "pods", "pods/status", "events", "persistentvolumeclaims", "endpoints"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Namespaces — the `vcluster` backend creates a per-instance host
  # namespace `vcluster-<instance>` (via SSA at create) and deletes it
  # at recycle to reap the entire vcluster Helm release in one shot.
  # Without `delete` here, the operator's recycle loop fails with 403
  # Forbidden and the pool gets stuck — observed at an internal cluster
  # during the first vkobe→vcluster migration attempt.
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # PodDisruptionBudgets — the k3s backend creates a PDB for HA control
  # planes (servers>1) and deletes it on every recycle. Without these verbs
  # the recycle loop's `delete()` fails with 403 Forbidden (RBAC is checked
  # before existence, so even single-server instances that never had a PDB
  # get 403, not 404), the instance-cleanup finalizer is never removed, and
  # the whole pool wedges in Recycling — observed at an internal cluster after
  # #152 shipped the PDB management without the matching RBAC.
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs", "jobs/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # RBAC for kobe-sync sidecars
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Nodes (fake-node syncer)
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update", "patch"]
  # CRD discovery (Velero detection)
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kobe.fullname" . }}
  labels:
    {{- include "kobe.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kobe.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "kobe.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "kobe.fullname" . }}-pool-publisher
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kobe.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kobe.fullname" . }}-pool-publisher
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kobe.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.poolPublisherServiceAccount | default (printf "%s-pool-publisher" (include "kobe.fullname" .)) }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "kobe.fullname" . }}-pool-publisher
  apiGroup: rbac.authorization.k8s.io
{{- if .Values.hostReaper.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kobe-host-reaper
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kobe.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kobe.fullname" . }}-host-reaper
  labels:
    {{- include "kobe.labels" . | nindent 4 }}
rules:
  - apiGroups: ["kobe.kunobi.ninja"]
    resources: ["clusterinstances"]
    # `list` (not `get`) because the reaper's final safety check uses a
    # cluster-wide LIST with `fieldSelector=metadata.name=<name>`. A bare
    # `get` against `Api::all<T>` for a namespaced T is unreliable —
    # the cluster-scoped path 404s on namespaced resources.
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kobe.fullname" . }}-host-reaper
  labels:
    {{- include "kobe.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kobe.fullname" . }}-host-reaper
subjects:
  - kind: ServiceAccount
    name: kobe-host-reaper
    namespace: {{ .Release.Namespace }}
{{- end }}
