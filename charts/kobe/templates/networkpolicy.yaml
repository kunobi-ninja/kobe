{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kobe.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kobe.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kobe.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: {{ .Values.service.port }}
          protocol: TCP
  egress:
    # DNS
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Kubernetes API server
    - to:
        - ipBlock:
            cidr: {{ .Values.networkPolicy.apiServerCIDR }}
      ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    # External services (registries, etcd, postgres)
    - to:
        {{- range .Values.networkPolicy.egressCIDRs }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
      ports:
        - port: 443
          protocol: TCP
        - port: 2379
          protocol: TCP
        - port: 5432
          protocol: TCP
{{- end }}
