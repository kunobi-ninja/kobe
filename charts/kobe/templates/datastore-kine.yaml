{{- if .Values.kine.enabled -}}
{{- $name := printf "%s-kine" (include "kobe.fullname" .) -}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kobe.labels" . | nindent 4 }}
    app.kubernetes.io/component: datastore-kine
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.kine.storage | quote }}
  {{- with .Values.kine.storageClassName }}
  storageClassName: {{ . }}
  {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kobe.labels" . | nindent 4 }}
    app.kubernetes.io/component: datastore-kine
spec:
  replicas: 1
  strategy:
    type: Recreate   # SQLite is single-writer
  selector:
    matchLabels:
      {{- include "kobe.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: datastore-kine
  template:
    metadata:
      labels:
        {{- include "kobe.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: datastore-kine
    spec:
      {{- with .Values.kine.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.kine.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      # Run as `nobody` with `fsGroup` set so kubelet chowns the PVC mount
      # on attach — otherwise the default root-owned volume is not writable
      # by the container, SQLite fails to open `/data/kine.db` with
      # "no such file or directory", and the pod crashloops.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
      containers:
        - name: kine
          image: {{ .Values.kine.image | quote }}
          imagePullPolicy: {{ .Values.kine.imagePullPolicy | default "IfNotPresent" | quote }}
          args:
            # `_journal_mode=WAL` switches SQLite from the default
            # rollback-journal mode to write-ahead-log, which lets readers
            # and writers proceed concurrently. Without it, every kube
            # apiserver bootstrap (hundreds of concurrent writes for
            # APIServices, ServiceAccounts, etc.) serializes through a
            # single exclusive lock and quickly hits "database is locked"
            # txn errors when more than one vkobe pool member is starting.
            #
            # `_busy_timeout=10000` (10s) gives us a longer wait for the
            # lock instead of failing fast — gives transient contention
            # under high churn a chance to clear.
            - --endpoint=sqlite:///data/kine.db?_journal_mode=WAL&_busy_timeout=10000
            - --listen-address=0.0.0.0:2379
            - --metrics-bind-address=0
          ports:
            - name: client
              containerPort: 2379
          resources:
            {{- toYaml .Values.kine.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ $name }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kobe.labels" . | nindent 4 }}
    app.kubernetes.io/component: datastore-kine
spec:
  selector:
    {{- include "kobe.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: datastore-kine
  ports:
    - name: client
      port: 2379
      targetPort: client
---
apiVersion: kobe.kunobi.ninja/v1alpha1
kind: KobeStore
metadata:
  name: {{ .Values.kine.storeName | default $name | quote }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kobe.labels" . | nindent 4 }}
    app.kubernetes.io/component: datastore-kine
spec:
  driver: kine-sqlite
  endpoints:
    - http://{{ $name }}.{{ .Release.Namespace }}.svc:2379
  capacity:
    maxClusters: {{ .Values.kine.maxClusters | default 20 }}
  replicas: 1
{{- end }}
