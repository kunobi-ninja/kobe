apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kobe.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kobe.labels" . | nindent 4 }}
  {{- with .Values.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicas }}
  strategy:
    {{- if le (int .Values.replicas) 1 }}
    type: Recreate
    {{- else }}
    type: RollingUpdate
    {{- end }}
  selector:
    matchLabels:
      {{- include "kobe.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kobe.selectorLabels" . | nindent 8 }}
      {{- if or .Values.signoz.scrape .Values.podAnnotations }}
      annotations:
        {{- if .Values.signoz.scrape }}
        # The cluster's SigNoz OTel collector discovers pods by these
        # annotations and scrapes their Prometheus /metrics into SigNoz.
        signoz.io/scrape: "true"
        signoz.io/port: {{ .Values.signoz.port | default .Values.service.port | quote }}
        signoz.io/path: {{ .Values.signoz.path | quote }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "kobe.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: kobe-operator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default (printf "v%s" .Chart.AppVersion) }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: OPERATOR_NAMESPACE
              value: {{ .Values.operatorNamespace | quote }}
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: BIND_ADDR
              value: "0.0.0.0:{{ .Values.service.port }}"
            - name: RUST_LOG
              value: {{ .Values.logLevel | quote }}
            - name: KOBE_SYNC_IMAGE
              value: {{ include "kobe.syncImage" . | quote }}
            - name: POOL_SERVICE_ACCOUNT
              value: {{ .Values.poolServiceAccount | default (include "kobe.serviceAccountName" .) | quote }}
            - name: POOL_PUBLISHER_SERVICE_ACCOUNT
              value: {{ .Values.poolPublisherServiceAccount | default (printf "%s-pool-publisher" (include "kobe.fullname" .)) | quote }}
            - name: KUBECONFIG_PUBLISHER_IMAGE
              value: "{{ .Values.image.repository }}:{{ .Values.image.tag | default (printf "v%s" .Chart.AppVersion) }}"
            {{- if .Values.postgres.urlSecret.name }}
            - name: POSTGRES_URL_DIR
              value: {{ .Values.postgres.urlSecret.mountPath | quote }}
            {{- else if .Values.postgres.url }}
            - name: POSTGRES_URL
              value: {{ .Values.postgres.url | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
          startupProbe:
            httpGet:
              path: /livez
              port: http
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if .Values.postgres.urlSecret.name }}
            - name: postgres-url
              mountPath: {{ .Values.postgres.urlSecret.mountPath | quote }}
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
        {{- if .Values.postgres.urlSecret.name }}
        # Connection URL projected to a `url` file so kunobi-reload (POSTGRES_URL_DIR)
        # picks up a credential rotation without a pod restart.
        - name: postgres-url
          secret:
            secretName: {{ .Values.postgres.urlSecret.name | quote }}
            items:
              - key: {{ .Values.postgres.urlSecret.key | quote }}
                path: url
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
