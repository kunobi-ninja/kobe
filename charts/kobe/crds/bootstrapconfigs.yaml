apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: bootstrapconfigs.kobe.kunobi.ninja
spec:
  group: kobe.kunobi.ninja
  names:
    categories: []
    kind: BootstrapConfig
    plural: bootstrapconfigs
    shortNames:
    - bc
    singular: bootstrapconfig
  scope: Namespaced
  versions:
  - additionalPrinterColumns: []
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for BootstrapConfigSpec via `CustomResource`
        properties:
          spec:
            description: BootstrapConfig stores a reusable bootstrap bundle in the host cluster.
            properties:
              files:
                additionalProperties:
                  type: string
                default: {}
                description: |-
                  Bundle files keyed by file name.

                  The initial MVP treats all `*.yaml` / `*.yml` entries as manifests and
                  applies them in lexical order. This keeps the API ready for richer
                  renderers later while already supporting built-in and custom bundles.
                type: object
              job:
                description: |-
                  Optional bootstrap runner job configuration.

                  When set, the operator runs a host-cluster Job that targets the leased
                  cluster using its generated kubeconfig Secret. This is useful for
                  tool-driven installs like `flux install`, `helm upgrade --install`, or
                  `kustomize build | kubectl apply`.
                nullable: true
                properties:
                  args:
                    default: []
                    description: Arguments for the runner container.
                    items:
                      type: string
                    type: array
                  command:
                    default: []
                    description: Entrypoint command for the runner container.
                    items:
                      type: string
                    type: array
                  env:
                    additionalProperties:
                      type: string
                    default: {}
                    description: Extra environment variables passed to the runner.
                    type: object
                  image:
                    description: Container image for the bootstrap runner.
                    type: string
                  imagePullPolicy:
                    description: Optional image pull policy.
                    nullable: true
                    type: string
                required:
                - image
                type: object
            type: object
        required:
        - spec
        title: BootstrapConfig
        type: object
    served: true
    storage: true
    subresources: {}
