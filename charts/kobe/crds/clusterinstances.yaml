                        type: string
                    required:
                    - dataStoreRef
                    type: object
                type: object
              bootstraps:
                default: []
                description: Standalone bootstraps. Pool-managed instances derive this from the pool.
                items:
                  properties:
                    name:
                      description: Name of the BootstrapConfig resource in the same namespace.
                      type: string
                    params:
                      additionalProperties:
                        type: string
                      default: {}
                      description: Optional renderer-specific parameters for this bootstrap.
                      type: object
                  required:
                  - name
                  type: object
                type: array
              cluster:
                description: Standalone cluster configuration. Pool-managed instances derive this from the pool.
                nullable: true
                properties:
                  agents:
                    description: |-
                      Number of k3s agent replicas (k3s backend only).
                      When set, creates a separate agent Deployment that joins the server.
                    format: uint32
                    minimum: 0.0
                    nullable: true
                    type: integer
                  expose:
                    description: Expose config (ingress/LoadBalancer/NodePort).
                    nullable: true
                    properties:
                      exposeType:
                        description: 'Expose type: "ingress", "NodePort", "LoadBalancer".'
                        type: string
                      ingressClassName:
                        description: Ingress class name (when expose_type="ingress").
                        nullable: true
                        type: string
                      nodePort:
                        description: NodePort number (when expose_type="NodePort").
                        format: int32
                        nullable: true
                        type: integer
                    required:
                    - exposeType
                    type: object
                  persistence:
                    description: Persistence config.
                    nullable: true
                    properties:
                      storageClassName:
                        description: Storage class name for dynamic provisioning.
                        nullable: true
                        type: string
                      storageRequestSize:
                        description: Storage request size (e.g., "10Gi").
                        nullable: true
                        type: string
                      storageType:
                        description: 'Storage type: "emptyDir", "dynamic", etc.'
                        nullable: true
                        type: string
                    type: object
                  serverArgs:
                    default: []
                    description: Extra k3s server args.
                    items:
                      type: string
                    type: array
                  servers:
                    default: 1
                    description: Number of control plane servers.
                    format: uint32
                    minimum: 0.0
                    type: integer
                  taints:
                    description: |-
                      Node taints applied to the cluster's control-plane node(s).

                      Semantics:
                      - **Field omitted** — backend default applies (e.g. k0s adds
                        `node-role.kubernetes.io/master:NoSchedule` when running
                        `controller --enable-worker`). Backward compatible.
                      - **Empty list `[]`** — no taints applied; any backend default is
                        suppressed. Useful for single-node CI/dev clusters where pods
                        need to schedule on the control-plane node.
                      - **Non-empty list** — exactly these taints are applied; backend
                        defaults are suppressed.

                      Currently honored by the k0s backend; other backends will gain
                      support over time.
                    items:
                      description: A single taint applied to cluster nodes. Mirrors `core/v1.Taint`.
                      properties:
                        effect:
                          description: Taint effect.
                          enum:
                          - NoSchedule
                          - PreferNoSchedule
                          - NoExecute
                          type: string
                        key:
                          description: Taint key (e.g. `dedicated`).
                          type: string
                        value:
                          description: Optional taint value (e.g. `gpu`).
                          nullable: true
                          type: string
                      required:
                      - effect
                      - key
                      type: object
                    nullable: true
                    type: array
                  version:
                    description: k3s version (e.g., "v1.31.3+k3s1").
                    type: string
                required:
                - version
                type: object
              healthCheck:
                description: Standalone health-check configuration. Pool-managed instances derive this from the pool.
                nullable: true
                properties:
                  failureThreshold:
                    default: 3
                    description: Consecutive failures before recycling a cluster.
                    format: uint32
                    minimum: 0.0
                    type: integer
                  intervalSeconds:
                    default: 30
                    description: How often to probe warm clusters, in seconds.
                    format: uint32
                    minimum: 0.0
                    type: integer
                type: object
              poolRef:
                description: Optional owning pool. When absent, this instance is standalone.
                nullable: true
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              readinessGates:
                default: []
                description: Standalone readiness gates. Pool-managed instances derive this from the pool.
                items:
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                    type:
                      enum:
                      - CRDExists
                      - DeploymentReady
                      - DaemonSetReady
                      - URLHealthy
                      type: string
                    url:
                      type: string
                  required:
                  - type
                  type: object
                type: array
              snapshot:
                description: Optional standalone snapshot/restore configuration.
                nullable: true
                properties:
                  enabled:
                    default: false
                    description: Enable golden image snapshotting via Velero.
                    type: boolean
                  goldenPrefix:
                    default: golden
                    description: Prefix for the golden backup name (e.g. "golden-<profile>").
                    type: string
                  refreshOn:
                    default: ProfileChange
                    description: When to refresh the golden image.
                    enum:
                    - ProfileChange
                    - Manual
                    type: string
                  storageLocation:
                    default: default
                    description: Velero BackupStorageLocation name to use.
                    type: string
                  ttl:
                    default: 720h
                    description: How long the Velero backup should be retained (e.g. "720h").
                    type: string
                  veleroNamespace:
                    default: velero
                    description: Namespace where the Velero server is installed.
                    type: string
                type: object
            type: object
          status:
            nullable: true
            properties:
              activeBootstrap:
                description: Bootstrap currently running for this instance, if any.
                nullable: true
                type: string
              bootstrapped:
                default: false
                description: Whether all configured bootstrap steps have completed successfully.
                type: boolean
              healthFailures:
                default: 0
                description: Consecutive health failures observed for this instance.
                format: uint32
                minimum: 0.0
                type: integer
              idleSince:
                description: When the instance became idle and eligible for scale-down.
                nullable: true
                type: string
              leaseRef:
                description: Lease currently attached to this instance.
                nullable: true
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              network:
                description: |-
                  Network ranges reserved for this instance (service + cluster CIDRs).
                  Allocated once before the backend StatefulSet/Deployment is built;
                  `None` until the instance controller's first reconcile picks a
                  free slot. Backends that own their own network plane (k3s, k0s)
                  MUST consume these values rather than hardcoded defaults.
                  Backends that reuse the host's network (vkobe) ignore this field.
                nullable: true
                properties:
                  clusterCidr:
                    description: |-
                      CIDR for in-cluster pod IPs (`--cluster-cidr` to k3s,
                      `podCIDR` to k0s, etc.).
                    type: string
                  serviceCidr:
                    description: |-
                      CIDR for in-cluster Service ClusterIPs (`--service-cidr` to k3s,
                      `serviceCIDR` to k0s, etc.).
                    type: string
                required:
                - clusterCidr
                - serviceCidr
                type: object
              phase:
                default: Creating
                enum:
                - Creating
                - Ready
                - Leased
                - Recycling
                - Unhealthy
                - Failed
                type: string
              provisioned:
                default: false
                description: Whether backend resources have been provisioned for this instance.
                type: boolean
              specHash:
                description: |-
                  Hash of the pool spec that created this instance, used for drift
                  detection.

                  `String` (not `u64`/`i64`): Kubernetes' OpenAPI structural schema
                  validator parses numeric values through `float64` and rejects integers
                  outside JSON's safe range (±2⁵³−1) with
                  `Invalid value: "number": specHash in body must be of type integer`.
                  Encoding as a fixed-width hex string sidesteps the precision problem
                  without throwing away any of the 64 bits of hash entropy. Same pattern
                  Kubernetes uses for `metadata.resourceVersion`. See
                  `pool::profile_spec_hash` for the encoding (`{:016x}` of a `u64`).
                  Equality comparison works directly via `==` on the string form.

                  `skip_serializing_if` is critical: this field is owned by the profile
                  controller (which writes `Some(...)` once at create time and on
                  subsequent reconciles), but the instance controller carries it through
                  every status patch via `spec_hash: status.spec_hash`. If the instance
                  controller's `status` read happens before the profile controller's
                  write, it holds `None` locally — and a JSON Merge Patch carrying
                  `"specHash": null` would *remove* the field from disk per RFC 7396.
                  Skipping serialization on `None` makes the field absent from the JSON
                  instead, which JSON Merge Patch interprets as "preserve on-disk
                  value" — closing the race regardless of which controller wins.
                nullable: true
                type: string
              stateSince:
                description: When the instance entered its current phase.
                nullable: true
                type: string
            type: object
        required:
        - spec
        title: ClusterInstance
        type: object
    served: true
    storage: true
    subresources:
      status: {}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: accesspolicies.kobe.kunobi.ninja
spec:
  group: kobe.kunobi.ninja
  names:
    categories: []
    kind: AccessPolicy
    plural: accesspolicies
    shortNames:
    - ap
    singular: accesspolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns: []
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for AccessPolicySpec via `CustomResource`
        properties:
          spec:
            description: |-
              AccessPolicy configures authentication and authorization for cluster lease requests.

              Each AccessPolicy represents one authentication method (OIDC provider, static token,
              or Kubernetes ServiceAccount) with associated authorization rules.
            properties:
              auth:
                description: Authentication method configuration.
                properties:
                  oidc:
                    description: OIDC provider (JWT-based) authentication.
                    nullable: true
                    properties:
                      algorithms:
                        default:
                        - RS256
                        description: Allowed JWT signing algorithms. Defaults to `["RS256"]`.
                        items:
                          type: string
                        type: array
                      audience:
                        default: []
                        description: Expected audience (`aud` claim). Empty = skip validation.
                        items:
                          type: string
                        type: array
                      authorizedParties:
                        default: []
                        description: Expected authorized parties (`azp` claim). Empty = skip validation.
                        items:
                          type: string
                        type: array
                      issuer:
                        description: OIDC issuer URL (must match `iss` claim).
                        type: string
                      jwksUrl:
                        description: JWKS URL for key fetching. Defaults to `{issuer}/.well-known/jwks.json`.
                        nullable: true
                        type: string
                    required:
                    - issuer
                    type: object
                  serviceAccount:
                    description: Kubernetes ServiceAccount authentication.
                    nullable: true
                    properties:
                      name:
                        description: ServiceAccount name.
                        type: string
                      namespace:
                        description: ServiceAccount namespace.
                        type: string
                    required:
                    - name
                    - namespace
                    type: object
                  ssh:
                    description: SSH Ed25519 public key authentication.
                    nullable: true
                    properties:
                      authorizedKeys:
                        description: Public keys in OpenSSH authorized_keys format.
                        items:
                          type: string
                        type: array
                      revokedKeys:
                        default: []
                        description: Revoked public keys (same format). Takes precedence over authorized_keys.
                        items:
                          type: string
                        type: array
                    required:
                    - authorizedKeys
                    type: object
                  token:
                    description: Static bearer token authentication.
                    nullable: true
                    properties:
                      secretRef:
                        description: 'Name of the Secret containing the token (key: "token").'
                        type: string
                    required:
                    - secretRef
                    type: object
                type: object
              identity:
                default: '{sub}'
                description: |-
                  Identity template for OIDC providers.
                  Uses `{claim_name}` syntax to interpolate JWT claims.
                  Supports dot-path traversal (e.g., `{private_metadata.role}`).
                  Defaults to `"{sub}"`. Ignored for token and serviceAccount auth.
                type: string
              rules:
                description: |-
                  Authorization rules. First matching rule wins for OIDC with match clauses.
                  For token and serviceAccount auth, rules without match clauses apply directly.
                items:
                  description: Authorization rule — what an authenticated caller can do.
                  properties:
                    match:
                      description: |-
                        Optional claim-based match for multi-role OIDC policies.
                        When set, this rule only applies if the JWT claim matches.
                      nullable: true
                      properties:
                        claim:
                          description: JWT claim path (supports dot-path like `private_metadata.role`).
                          type: string
                        value:
                          description: Value to match.
                          type: string
                      required:
                      - claim
                      - value
                      type: object
                    maxConcurrentLeases:
                      description: Maximum concurrent active leases for this identity.
                      format: uint32
                      minimum: 0.0
                      type: integer
                    maxExtensions:
                      default: 2
                      description: Maximum TTL extensions per lease.
                      format: uint32
                      minimum: 0.0
                      type: integer
                    maxTtl:
                      description: Maximum TTL for leases (e.g., "1h", "30m").
                      type: string
                    pools:
                      description: |-
                        Pool name patterns this rule allows (e.g., `["ci-*"]`).
                        Supports `*` suffix wildcard and literal `*` for all pools.
                      items:
                        type: string
                      type: array
                  required:
                  - maxConcurrentLeases
                  - maxTtl
                  - pools
                  type: object
                type: array
            required:
            - auth
            - rules
            type: object
        required:
        - spec
        title: AccessPolicy
        type: object
    served: true
    storage: true
    subresources: {}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: bootstrapconfigs.kobe.kunobi.ninja
spec:
  group: kobe.kunobi.ninja
  names:
    categories: []
    kind: BootstrapConfig
    plural: bootstrapconfigs
    shortNames:
    - bc
    singular: bootstrapconfig
  scope: Namespaced
  versions:
  - additionalPrinterColumns: []
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for BootstrapConfigSpec via `CustomResource`
        properties:
          spec:
            description: BootstrapConfig stores a reusable bootstrap bundle in the host cluster.
            properties:
              files:
                additionalProperties:
                  type: string
                default: {}
                description: |-
                  Bundle files keyed by file name.

                  The initial MVP treats all `*.yaml` / `*.yml` entries as manifests and
                  applies them in lexical order. This keeps the API ready for richer
                  renderers later while already supporting built-in and custom bundles.
                type: object
              job:
                description: |-
                  Optional bootstrap runner job configuration.

                  When set, the operator runs a host-cluster Job that targets the leased
                  cluster using its generated kubeconfig Secret. This is useful for
                  tool-driven installs like `flux install`, `helm upgrade --install`, or
                  `kustomize build | kubectl apply`.
                nullable: true
                properties:
                  args:
                    default: []
                    description: Arguments for the runner container.
                    items:
                      type: string
                    type: array
                  command:
                    default: []
                    description: Entrypoint command for the runner container.
                    items:
                      type: string
                    type: array
                  env:
                    additionalProperties:
                      type: string
                    default: {}
                    description: Extra environment variables passed to the runner.
                    type: object
                  image:
                    description: Container image for the bootstrap runner.
                    type: string
                  imagePullPolicy:
                    description: Optional image pull policy.
                    nullable: true
                    type: string
                required:
                - image
                type: object
            type: object
        required:
        - spec
        title: BootstrapConfig
        type: object
    served: true
    storage: true
    subresources: {}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: kobestores.kobe.kunobi.ninja
spec:
  group: kobe.kunobi.ninja
  names:
    categories: []
    kind: KobeStore
    plural: kobestores
    shortNames:
    - ks
    singular: kobestore
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.driver
      name: Driver
      type: string
    - jsonPath: .status.ready
      name: Ready
      type: boolean
    - jsonPath: .status.currentClusters
      name: Clusters
      type: integer
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for KobeStoreSpec via `CustomResource`
        properties:
          spec:
            description: |-
              KobeStore represents an external storage backend (etcd or kine-sqlite)
              that virtual cluster kube-apiservers connect to via `--etcd-servers`
              and `--etcd-prefix`.
            properties:
              capacity:
                description: Capacity limits.
                properties:
                  maxClusters:
                    description: Maximum number of virtual clusters this KobeStore can serve.
                    format: uint32
                    minimum: 0.0
                    type: integer
                required:
                - maxClusters
                type: object
              driver:
                description: Storage driver type.
                enum:
                - etcd
                - kine-sqlite
                type: string
              endpoints:
                description: Endpoints to connect to (e.g. ["https://etcd-0:2379"]).
                items:
                  type: string
                type: array
              replicas:
                description: Number of replicas for the storage backend (relevant for etcd).
                format: uint32
                minimum: 0.0
                nullable: true
                type: integer
              tls:
                description: Optional TLS configuration for the connection.
                nullable: true
                properties:
                  secretRef:
                    description: |-
                      Name of the Kubernetes Secret containing TLS credentials
                      (ca.crt, tls.crt, tls.key).
                    type: string
                required:
                - secretRef
                type: object
            required:
            - capacity
            - driver
            - endpoints
            type: object
          status:
            description: Runtime status of a KobeStore.
            nullable: true
            properties:
              currentClusters:
                default: 0
                description: Number of virtual clusters currently using this KobeStore.
                format: uint32
                minimum: 0.0
                type: integer
              ready:
                default: false
                description: Whether the KobeStore is reachable and healthy.
                type: boolean
              usedBy:
                default: []
                description: List of virtual clusters using this KobeStore.
                items:
                  description: Identifies a virtual cluster using this KobeStore.
                  properties:
                    name:
                      description: Name of the virtual cluster.
                      type: string
                    namespace:
                      description: Namespace of the virtual cluster.
                      type: string
                  required:
                  - name
                  - namespace
                  type: object
                type: array
            type: object
        required:
        - spec
        title: KobeStore
        type: object
    served: true
    storage: true
    subresources:
      status: {}
