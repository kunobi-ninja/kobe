                            - replicaset
                            - statefulset
                            - daemonset
                            - job
                            - cronjob
                            - namespace
                            - serviceaccount
                            - garbagecollector
                            description: Which controllers to enable in the virtual KCM.
                            items:
                              type: string
                            type: array
                        type: object
                      metricsPort:
