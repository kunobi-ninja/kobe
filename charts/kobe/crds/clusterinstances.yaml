apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clusterinstances.kobe.kunobi.ninja
spec:
  group: kobe.kunobi.ninja
  names:
    categories: []
    kind: ClusterInstance
    plural: clusterinstances
    shortNames:
    - ci
    singular: clusterinstance
  scope: Namespaced
  versions:
  - additionalPrinterColumns: []
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for ClusterInstanceSpec via `CustomResource`
        properties:
          spec:
            description: |-
              ClusterInstance is the authoritative inventory record for one provisioned cluster.

              Instances may be pool-managed (`spec.poolRef` present) or standalone
              (`spec.poolRef` omitted). Backend-specific resources are implementation
              details owned by the reconciler for this instance.
            properties:
              addons:
                default: []
                description: Standalone addons. Pool-managed instances derive this from the pool.
                items:
                  properties:
                    manifest:
                      description: Inline Kubernetes manifest YAML to apply after vcluster is ready.
                      nullable: true
                      type: string
                    name:
                      description: Human-readable name for the addon.
                      type: string
                    url:
                      description: URL to fetch manifest from (alternative to inline).
                      nullable: true
                      type: string
                  required:
                  - name
                  type: object
                type: array
              backend:
                description: Standalone backend configuration. Pool-managed instances derive this from the pool.
                nullable: true
                properties:
                  capi:
                    description: CAPI backend configuration (capi backend only).
                    nullable: true
                    properties:
                      infrastructureApiVersion:
                        description: API version of the infrastructure CRD (e.g. "infrastructure.cluster.x-k8s.io/v1alpha1").
                        type: string
                      infrastructureKind:
                        description: Kind of the infrastructure CRD (e.g. "VCluster", "K0smotronCluster").
                        type: string
                      infrastructurePlural:
                        description: |-
                          Optional explicit plural form for the infrastructure CRD resource name.
                          If not set, derived automatically by lowercasing the kind and appending "s".
                          Use this for kinds with irregular plurals (e.g. "ingresses" for "Ingress").
                        nullable: true
                        type: string
                      infrastructureSpec:
                        description: |-
                          Raw JSON/YAML spec to embed in the infrastructure resource.
                          This is provider-specific and passed through as-is.
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                    required:
                    - infrastructureApiVersion
                    - infrastructureKind
                    type: object
                  datastore:
                    description: Shared PostgreSQL datastore configuration (k3s/k0s backends only).
                    nullable: true
                    properties:
                      goldenTemplates:
                        default: false
                        description: Enable golden images via PostgreSQL template databases.
                        type: boolean
                      secretKey:
                        default: connection-url
                        description: 'Key in the Secret (default: "connection-url").'
                        type: string
                      secretRef:
                        description: Name of the Secret containing the PostgreSQL connection URL.
                        type: string
                    required:
                    - secretRef
                    type: object
                  type:
                    default: k3s
                    description: Backend type.
                    enum:
                    - k3s
                    - k0s
                    - capi
                    - vkobe
                    - vcluster
                    type: string
                  vcluster:
                    description: vcluster backend configuration (vcluster backend only).
                    nullable: true
                    properties:
                      chartVersion:
                        description: |-
                          Helm chart version of `loft-sh/vcluster` to deploy. If unset, the
                          operator's pinned default applies.
                        nullable: true
                        type: string
                      values:
                        description: |-
                          Inline Helm values (YAML) merged on top of the operator's defaults.
                          Use this to enable / disable features per pool (sync targets,
                          expose mode, resource limits, etc).

                          Schema: free-form YAML matching vcluster's chart values
                          (see https://www.vcluster.com/docs/configure/vcluster-yaml).
                        nullable: true
                        type: string
                    type: object
                  vkobe:
                    description: vkobe backend configuration (vkobe backend only).
                    nullable: true
                    properties:
                      dataStoreRef:
                        description: Reference to the KobeStore CRD that this cluster connects to.
                        properties:
                          name:
                            description: Name of the KobeStore resource in the same namespace.
                            type: string
                        required:
                        - name
                        type: object
                      kcm:
                        description: Optional KCM (kube-controller-manager) configuration.
                        nullable: true
                        properties:
                          controllers:
                            default:
                            - deployment
                            - replicaset
                            - statefulset
                            - daemonset
                            - job
                            - cronjob
                            - namespace
                            - serviceaccount
                            - garbagecollector
                            description: Which controllers to enable in the virtual KCM.
                            items:
                              type: string
                            type: array
                        type: object
                      metricsPort:
                        default: 9090
                        description: 'Port for health/metrics endpoints (default: 9090).'
                        format: uint16
                        maximum: 65535.0
                        minimum: 0.0
                        type: integer
                      proxyPort:
                        default: 8443
                        description: 'Port for the virtual API server proxy (default: 8443).'
                        format: uint16
                        maximum: 65535.0
                        minimum: 0.0
                        type: integer
                      syncers:
                        default:
                        - pods
                        - services
                        - configmaps
                        - secrets
                        - endpoints
                        - ingresses
                        description: Which resource syncers to enable. Defaults to core set.
                        items:
                          type: string
                        type: array
                      version:
                        default: '1.32'
                        description: Kubernetes version for the virtual kube-apiserver (e.g. "1.32").
                        type: string
                    required:
                    - dataStoreRef
                    type: object
                type: object
              bootstraps:
                default: []
                description: Standalone bootstraps. Pool-managed instances derive this from the pool.
                items:
                  properties:
                    name:
                      description: Name of the BootstrapConfig resource in the same namespace.
                      type: string
                    params:
                      additionalProperties:
                        type: string
                      default: {}
                      description: Optional renderer-specific parameters for this bootstrap.
                      type: object
                  required:
                  - name
                  type: object
                type: array
              cluster:
                description: Standalone cluster configuration. Pool-managed instances derive this from the pool.
                nullable: true
                properties:
                  agents:
                    description: |-
                      Number of k3s agent replicas (k3s backend only).
                      When set, creates a separate agent Deployment that joins the server.
                    format: uint32
                    minimum: 0.0
                    nullable: true
                    type: integer
                  clusterDomain:
                    description: |-
                      Kubernetes cluster DNS domain (defaults to `cluster.local`).
                      Used to build the FQDN of the cluster's API Service for the
                      agent's `--server` URL, the apiserver TLS SANs, and the
                      published kubeconfig.

                      Why this matters: the short name `{svc}.{ns}.svc` has 2 dots,
                      matching the typical `ndots:2` in resolv.conf. Resolvers then
                      query it as absolute first; Alpine/musl-based k3s and k0s
                      images don't fall back to `search` domains after that returns
                      NXDOMAIN and the agent's join silently fails. Using the FQDN
                      (4 dots) sidesteps the search-domain dance entirely.
                    nullable: true
                    type: string
                  expose:
                    description: Expose config (ingress/LoadBalancer/NodePort).
                    nullable: true
                    properties:
                      exposeType:
                        description: 'Expose type: "ingress", "NodePort", "LoadBalancer".'
                        type: string
                      ingressClassName:
                        description: Ingress class name (when expose_type="ingress").
                        nullable: true
                        type: string
                      nodePort:
                        description: NodePort number (when expose_type="NodePort").
                        format: int32
                        nullable: true
                        type: integer
                    required:
                    - exposeType
                    type: object
                  kubeletSharedMount:
                    description: |-
                      Shared kubelet mount opt-in. When `None` (default) the field is
                      omitted from the rendered StatefulSet/Deployment and behavior is
                      unchanged. When `Some(...)` the k3s backend emits an extra
                      hostPath volume + a Bidirectional VolumeMount at `/var/lib/kubelet`
                      inside the selected containers. See [`KubeletSharedMountConfig`]
                      for fields. Honored only by the k3s backend.
                    nullable: true
                    properties:
                      agents:
                        default: true
                        description: Apply the shared mount to the k3s agent container(s). Default true.
                        type: boolean
                      hostPathRoot:
                        default: /var/lib/kobe/leases
                        description: |-
                          Host directory root under which per-cluster kubelet trees live.
                          **MUST be an absolute path** (the operator does not validate
                          this — a relative path will produce a relative hostPath, which
                          the kubelet refuses to mount). Final per-pod path becomes
                          `<host_path_root>/<cluster-name>/kubelets/<pod-name>`. Default
                          `/var/lib/kobe/leases`.
                        type: string
                      server:
                        default: true
                        description: Apply the shared mount to the k3s server container. Default true.
                        type: boolean
                    type: object
                  persistence:
                    description: Persistence config.
                    nullable: true
                    properties:
                      storageClassName:
                        description: Storage class name for dynamic provisioning.
                        nullable: true
                        type: string
                      storageRequestSize:
                        description: Storage request size (e.g., "10Gi").
                        nullable: true
                        type: string
                      storageType:
                        description: 'Storage type: "emptyDir", "dynamic", etc.'
                        nullable: true
                        type: string
                    type: object
                  placement:
                    description: |-
                      Node placement strategy for the cluster's pods. When omitted, the
                      scheduler picks any eligible node independently for each pod.

                      The block splits placement into orthogonal concerns:
                      - `placement.node` — per-pod node selection (label selector +
                        tolerations). Affects which Kubernetes nodes the pods can land
                        on at all.
                      - `placement.intraInstance` — co-location within ONE
                        `ClusterInstance` (server pod ↔ agent pods of the same cluster).
                      - `placement.interInstance` — spread across DIFFERENT
                        `ClusterInstance`s (pool members relative to each other).

                      Currently meaningful for the k3s and k0s backends, which have
                      split server and agent pods. The vcluster and vkobe backends
                      ignore placement (they reuse the host cluster's pod plane).
                    nullable: true
                    properties:
                      interInstance:
                        description: Inter-instance spread of pool members across hosts.
                        nullable: true
                        properties:
                          spread:
                            description: |-
                              Anti-affinity spread configuration. When omitted, no
                              inter-instance constraint is rendered.
                            nullable: true
                            properties:
                              strength:
                                description: Strength of the spread constraint — soft hint vs. hard requirement.
                                enum:
                                - Preferred
                                - Required
                                type: string
                              topologyKey:
                                default: kubernetes.io/hostname
                                description: |-
                                  Topology domain to spread across. Defaults to
                                  `kubernetes.io/hostname` when omitted (host-level spread). Set
                                  to a rack/zone/region label to spread across a coarser domain.
                                type: string
                            required:
                            - strength
                            type: object
                        type: object
                      intraInstance:
                        description: |-
                          Intra-instance co-location of pods within ONE `ClusterInstance`
                          (server vs agent of the same cluster).
                        nullable: true
                        properties:
                          mode:
                            description: |-
                              Co-location mode for the instance's pods.

                              - `Any` (default): scheduler picks each pod's node independently.
                              - `SameHost`: agent pods are forced onto the server pod's node
                                via a required `kubernetes.io/hostname` podAffinity, used to
                                side-step host clusters with broken cross-node pod routing.
                            enum:
                            - Any
                            - SameHost
                            type: string
                        required:
                        - mode
                        type: object
                      node:
                        description: |-
                          Per-pod node selection: which nodes can host the cluster's pods,
                          and which taints those pods tolerate. Rendered to `nodeAffinity`
                          and `tolerations` on EVERY pod the backend creates (server
                          StatefulSet and agent Deployment).
                        nullable: true
                        properties:
                          selector:
                            description: |-
                              Label selector restricting which nodes may host the cluster's
                              pods. Rendered into `spec.affinity.nodeAffinity.requiredDuring
                              SchedulingIgnoredDuringExecution` on every pod. When omitted,
                              no node-selector constraint is emitted.

                              Both `matchLabels` and `matchExpressions` are honored.
                              `matchLabels` entries become `In`-operator `NodeSelectorRequirement`s
                              and merge with `matchExpressions` into a single `NodeSelectorTerm`
                              (a logical AND across all requirements).
                            nullable: true
                            properties:
                              matchExpressions:
                                description: matchExpressions is a list of label selector requirements. The requirements are ANDed.
                                items:
                                  description: A label selector requirement is a selector that contains values, a key, and an operator that relates the key and values.
                                  properties:
                                    key:
                                      description: key is the label key that the selector applies to.
                                      type: string
                                    operator:
                                      description: operator represents a key's relationship to a set of values. Valid operators are In, NotIn, Exists and DoesNotExist.
                                      type: string
                                    values:
                                      description: values is an array of string values. If the operator is In or NotIn, the values array must be non-empty. If the operator is Exists or DoesNotExist, the values array must be empty. This array is replaced during a strategic merge patch.
                                      items:
                                        type: string
                                      type: array
                                  required:
                                  - key
                                  - operator
                                  type: object
                                type: array
                              matchLabels:
                                additionalProperties:
                                  type: string
                                description: matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels map is equivalent to an element of matchExpressions, whose key field is "key", the operator is "In", and the values array contains only "value". The requirements are ANDed.
                                type: object
                            type: object
                          tolerations:
                            description: |-
                              Tolerations applied verbatim to every pod the backend creates.
                              Shape matches `core/v1.Toleration` (key/operator/value/effect/
                              tolerationSeconds).
                            items:
                              description: The pod this Toleration is attached to tolerates any taint that matches the triple <key,value,effect> using the matching operator <operator>.
                              properties:
                                effect:
                                  description: Effect indicates the taint effect to match. Empty means match all taint effects. When specified, allowed values are NoSchedule, PreferNoSchedule and NoExecute.
                                  type: string
                                key:
                                  description: Key is the taint key that the toleration applies to. Empty means match all taint keys. If the key is empty, operator must be Exists; this combination means to match all values and all keys.
                                  type: string
                                operator:
                                  description: Operator represents a key's relationship to the value. Valid operators are Exists and Equal. Defaults to Equal. Exists is equivalent to wildcard for value, so that a pod can tolerate all taints of a particular category.
                                  type: string
                                tolerationSeconds:
                                  description: TolerationSeconds represents the period of time the toleration (which must be of effect NoExecute, otherwise this field is ignored) tolerates the taint. By default, it is not set, which means tolerate the taint forever (do not evict). Zero and negative values will be treated as 0 (evict immediately) by the system.
                                  format: int64
                                  type: integer
                                value:
                                  description: Value is the taint value the toleration matches to. If the operator is Exists, the value should be empty, otherwise just a regular string.
                                  type: string
                              type: object
                            type: array
                        type: object
                    type: object
                  registryMirrors:
                    additionalProperties:
                      items:
                        type: string
                      type: array
                    description: |-
                      Container registry mirrors for the leased cluster's container
                      runtime. Maps source registry hostname (e.g. `docker.io`,
                      `quay.io`) to a list of mirror endpoint URLs the runtime should
                      try before the source.

                      Currently honored by the k3s backend, which writes the map into
                      `/etc/rancher/k3s/registries.yaml` on every node — k3s reads it
                      at startup and configures containerd accordingly.
                      (https://docs.k3s.io/installation/private-registry).

                      Why this matters: leased clusters running inside a host cluster
                      with restricted egress can't reach upstream registries directly.
                      Without a mirror config, every Pod that pulls e.g. `busybox:1.36`
                      hits `ImagePullBackOff` because the leased cluster's containerd
                      goes straight to `docker.io`. Setting a mirror redirects the
                      pull through an in-network proxy (Harbor, Sonatype, an Artifact
                      Registry mirror, etc.) that the host cluster CAN reach.

                      Example:
                        registryMirrors:
                          docker.io:
                            - https://registry.example.com
                            - https://docker-mirror.example.com
                    nullable: true
                    type: object
                  serverArgs:
                    default: []
                    description: Extra k3s server args.
                    items:
                      type: string
                    type: array
                  servers:
                    default: 1
                    description: Number of control plane servers.
                    format: uint32
                    minimum: 0.0
                    type: integer
                  taints:
                    description: |-
                      Node taints applied to the cluster's control-plane node(s).

                      Semantics:
                      - **Field omitted** — backend default applies (e.g. k0s adds
                        `node-role.kubernetes.io/master:NoSchedule` when running
                        `controller --enable-worker`). Backward compatible.
                      - **Empty list `[]`** — no taints applied; any backend default is
                        suppressed. Useful for single-node CI/dev clusters where pods
                        need to schedule on the control-plane node.
                      - **Non-empty list** — exactly these taints are applied; backend
                        defaults are suppressed.

                      Currently honored by the k0s backend; other backends will gain
                      support over time.
                    items:
                      description: A single taint applied to cluster nodes. Mirrors `core/v1.Taint`.
                      properties:
                        effect:
                          description: Taint effect.
                          enum:
                          - NoSchedule
                          - PreferNoSchedule
                          - NoExecute
                          type: string
                        key:
                          description: Taint key (e.g. `dedicated`).
                          type: string
                        value:
                          description: Optional taint value (e.g. `gpu`).
                          nullable: true
                          type: string
                      required:
                      - effect
                      - key
                      type: object
                    nullable: true
                    type: array
                  version:
                    description: k3s version (e.g., "v1.31.3+k3s1").
                    type: string
                required:
                - version
                type: object
              healthCheck:
                description: Standalone health-check configuration. Pool-managed instances derive this from the pool.
                nullable: true
                properties:
                  failureThreshold:
                    default: 3
                    description: Consecutive failures before recycling a cluster.
                    format: uint32
                    minimum: 0.0
                    type: integer
                  intervalSeconds:
                    default: 30
                    description: How often to probe warm clusters, in seconds.
                    format: uint32
                    minimum: 0.0
                    type: integer
                type: object
              poolRef:
                description: Optional owning pool. When absent, this instance is standalone.
                nullable: true
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              readinessGates:
                default: []
                description: Standalone readiness gates. Pool-managed instances derive this from the pool.
                items:
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                    type:
                      enum:
                      - CRDExists
                      - DeploymentReady
                      - DaemonSetReady
                      - URLHealthy
                      - SchedulingProbe
                      type: string
                    url:
                      type: string
                  required:
                  - type
                  type: object
                type: array
              snapshot:
                description: Optional standalone snapshot/restore configuration.
                nullable: true
                properties:
                  enabled:
                    default: false
                    description: Enable golden image snapshotting via Velero.
                    type: boolean
                  goldenPrefix:
                    default: golden
                    description: Prefix for the golden backup name (e.g. "golden-<profile>").
                    type: string
                  refreshOn:
                    default: ProfileChange
                    description: When to refresh the golden image.
                    enum:
                    - ProfileChange
                    - Manual
                    type: string
                  storageLocation:
                    default: default
                    description: Velero BackupStorageLocation name to use.
                    type: string
                  ttl:
                    default: 720h
                    description: How long the Velero backup should be retained (e.g. "720h").
                    type: string
                  veleroNamespace:
                    default: velero
                    description: Namespace where the Velero server is installed.
                    type: string
                type: object
            type: object
          status:
            nullable: true
            properties:
              activeBootstrap:
                description: Bootstrap currently running for this instance, if any.
                nullable: true
                type: string
              bootstrapped:
                default: false
                description: Whether all configured bootstrap steps have completed successfully.
                type: boolean
              conditions:
                description: |-
                  Standard Kubernetes-style status conditions, derived centrally by
                  the instance controller from `phase` / `provisioned` /
                  `bootstrapped` (see `derive_instance_conditions`). Currently
                  emitted: `Provisioned`, `Ready`, `Bootstrapped`. These give
                  `kubectl` and ops tooling a familiar, machine-readable surface for
                  *why* the instance is where it is.

                  `skip_serializing_if = "Vec::is_empty"` protects the list from
                  cross-controller Merge-Patch erasure, same pattern as `spec_hash`:
                  the profile controller (a separate status writer) re-emits status
                  without conditions of its own, so an empty `Vec` must be omitted
                  from the JSON entirely — otherwise a JSON Merge Patch carrying
                  `"conditions": []` would replace the on-disk list with an empty
                  one (RFC 7396 / array-replacement).
                items:
                  description: |-
                    One status condition on a `ClusterInstance`. Mirrors the core/v1
                    condition shape (type/status/reason/message/lastTransitionTime) — and
                    `KobeStoreCondition` — so kubectl and operators see a familiar
                    surface across all Kobe resources.
                  properties:
                    lastTransitionTime:
                      description: |-
                        RFC3339 of the last status change. Updated only when `status`
                        flips (True ↔ False ↔ Unknown), not on every reconcile, so tools
                        tailing `kubectl get -w` see meaningful transitions rather than
                        churn.
                      nullable: true
                      type: string
                    message:
                      description: |-
                        Human-readable detail, generally a copy of `status.message` for
                        the current state (or empty when there is none).
                      type: string
                    reason:
                      description: |-
                        Machine-readable reason. For the `True` case this is the
                        condition name (e.g. `Provisioned`); for the `False` case it is
                        typically the current phase (e.g. `Creating`, `Failed`,
                        `Recycling`) so operators can see at a glance what is blocking.
                      type: string
                    status:
                      description: 'One of: `True`, `False`, `Unknown`.'
                      type: string
                    type:
                      description: |-
                        Condition name. Emitted values: `Provisioned`, `Ready`,
                        `Bootstrapped`.
                      type: string
                  required:
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              createdWith:
                description: |-
                  Provenance: which version of kobe stamped this `ClusterInstance`
                  at creation time. Set once by the profile controller in
                  `ensure_cluster_instance` and never overwritten. Future logic
                  (rolling upgrade, drift detection by version, manual recycle
                  triggers, …) compares this against the running operator's
                  version to decide whether the instance is "stale".

                  `None` for instances created by kobe < 0.17 — consumers should
                  treat the absence as "unknown / pre-provenance" and decide
                  per-policy whether to migrate or leave alone.

                  `skip_serializing_if = "Option::is_none"` is critical here, same
                  pattern as `spec_hash` above: every status patch from the
                  instance controller constructs a fresh `ClusterInstanceStatus`
                  where this field defaults to `None`. Without `skip_serializing_if`,
                  the JSON Merge Patch would carry `"createdWith": null` and wipe
                  the on-disk value (RFC 7396). Skipping the field on `None`
                  preserves the original write through every subsequent patch.
                nullable: true
                properties:
                  backendType:
                    description: Which backend to use for cluster provisioning.
                    enum:
                    - k3s
                    - k0s
                    - capi
                    - vkobe
                    - vcluster
                    nullable: true
                    type: string
                  kobeSyncImage:
                    description: |-
                      kobe-sync sidecar image used at create time. Recorded for
                      `Vkobe` backends only (other backends don't run kobe-sync).
                      Format matches the operator's `KOBE_SYNC_IMAGE` env var, e.g.
                      `"zondax/kobe-sync:v0.16.0"`.
                    nullable: true
                    type: string
                  operatorVersion:
                    description: |-
                      Semver of the kobe-operator binary that created this instance,
                      taken from `env!("CARGO_PKG_VERSION")` at create time. Example:
                      `"0.17.0"`.
                    type: string
                required:
                - operatorVersion
                type: object
              healthFailures:
                default: 0
                description: Consecutive health failures observed for this instance.
                format: uint32
                minimum: 0.0
                type: integer
              idleSince:
                description: |-
                  When the instance became idle and eligible for scale-down.

                  Intentionally NO `skip_serializing_if` (same reasoning as `lease_ref`):
                  actively managed, not write-once. Set to `Some(now)` when the instance
                  becomes idle and back to `None` to **clear** it the moment it stops
                  being idle (leased, recycling, …). The `None`→`null` Merge-Patch delete
                  is required; omitting it would leave a busy instance carrying a stale
                  idle timestamp and corrupt the scale-down decision in `pool::manager`.
                nullable: true
                type: string
              leaseRef:
                description: |-
                  Lease currently attached to this instance.

                  Intentionally NO `skip_serializing_if`: unlike the write-once
                  `spec_hash`/`created_with` fields, `lease_ref` is *actively managed* —
                  set when a lease binds and written back to `None` to **clear** it when
                  the lease is released/recycled. `None` is a meaningful "clear" signal,
                  so it must serialize as `null` (the Merge-Patch delete) rather than be
                  omitted. Adding `skip_serializing_if` here would make a released
                  instance keep a stale `lease_ref` forever.
                nullable: true
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              message:
                description: |-
                  Human-readable detail about the instance's current state — *why*
                  it is in `phase`. Set fresh on every status write by the instance
                  controller (each construction site supplies a concise phrase like
                  `"provisioning backend resources"` or `"running bootstrap 'foo'"`),
                  so it always describes the most recent transition rather than a
                  stale value.

                  `skip_serializing_if = "Option::is_none"` protects it from
                  cross-controller Merge-Patch erasure, same pattern as `spec_hash`:
                  a writer that leaves this `None` (e.g. the profile controller, or
                  a "ready / no message" instance-controller path) must omit the key
                  entirely, otherwise a JSON Merge Patch carrying `"message": null`
                  would wipe the on-disk value (RFC 7396).
                nullable: true
                type: string
              network:
                description: |-
                  Network ranges reserved for this instance (service + cluster CIDRs).
                  Allocated once before the backend StatefulSet/Deployment is built;
                  `None` until the instance controller's first reconcile picks a
                  free slot. Backends that own their own network plane (k3s, k0s)
                  MUST consume these values rather than hardcoded defaults.
                  Backends that reuse the host's network (vkobe) ignore this field.
                nullable: true
                properties:
                  clusterCidr:
                    description: |-
                      CIDR for in-cluster pod IPs (`--cluster-cidr` to k3s,
                      `podCIDR` to k0s, etc.).
                    type: string
                  serviceCidr:
                    description: |-
                      CIDR for in-cluster Service ClusterIPs (`--service-cidr` to k3s,
                      `serviceCIDR` to k0s, etc.).
                    type: string
                required:
                - clusterCidr
                - serviceCidr
                type: object
              phase:
                default: Creating
                enum:
                - Creating
                - Ready
                - Leased
                - Recycling
                - Unhealthy
                - Failed
                type: string
              provisioned:
                default: false
                description: Whether backend resources have been provisioned for this instance.
                type: boolean
              specHash:
                description: |-
                  Hash of the pool spec that created this instance, used for drift
                  detection.

                  `String` (not `u64`/`i64`): Kubernetes' OpenAPI structural schema
                  validator parses numeric values through `float64` and rejects integers
                  outside JSON's safe range (±2⁵³−1) with
                  `Invalid value: "number": specHash in body must be of type integer`.
                  Encoding as a fixed-width hex string sidesteps the precision problem
                  without throwing away any of the 64 bits of hash entropy. Same pattern
                  Kubernetes uses for `metadata.resourceVersion`. See
                  `pool::profile_spec_hash` for the encoding (`{:016x}` of a `u64`).
                  Equality comparison works directly via `==` on the string form.

                  `skip_serializing_if` is critical: this field is owned by the profile
                  controller (which writes `Some(...)` once at create time and on
                  subsequent reconciles), but the instance controller carries it through
                  every status patch via `spec_hash: status.spec_hash`. If the instance
                  controller's `status` read happens before the profile controller's
                  write, it holds `None` locally — and a JSON Merge Patch carrying
                  `"specHash": null` would *remove* the field from disk per RFC 7396.
                  Skipping serialization on `None` makes the field absent from the JSON
                  instead, which JSON Merge Patch interprets as "preserve on-disk
                  value" — closing the race regardless of which controller wins.
                nullable: true
                type: string
              stateSince:
                description: |-
                  When the instance entered its current phase. Written `Some(now)` on
                  every transition; never deliberately cleared, but kept without
                  `skip_serializing_if` for consistency with the other actively-managed
                  timestamp fields above.
                nullable: true
                type: string
            type: object
        required:
        - spec
        title: ClusterInstance
        type: object
    served: true
    storage: true
    subresources:
      status: {}
