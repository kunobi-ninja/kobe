apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: authpolicies.kunobi.ninja
spec:
  group: kunobi.ninja
  names:
    categories: []
    kind: AuthPolicy
    plural: authpolicies
    shortNames:
    - ap
    singular: authpolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns: []
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for AuthPolicySpec via `CustomResource`
        properties:
          spec:
            description: |-
              AuthPolicy configures a single OIDC provider with role extraction and per-role policies.

              Each AuthPolicy CRD represents one identity provider (e.g., GitHub Actions, Clerk, Auth0).
              The operator watches all AuthPolicy CRDs and compiles them into a lookup table keyed by issuer.
            properties:
              algorithms:
                default:
                - RS256
                description: Allowed JWT signing algorithms. Defaults to `["RS256"]`.
                items:
                  type: string
                type: array
              audience:
                default: []
                description: Expected `aud` (audience) claim values. Empty = skip audience validation.
                items:
                  type: string
                type: array
              authorizedParties:
                default: []
                description: Expected `azp` (Authorized Party) values. Empty = skip azp validation.
                items:
                  type: string
                type: array
              identityTemplate:
                default: '{sub}'
                description: |-
                  Template for building the identity string from JWT claims.
                  Use `{claim_name}` to interpolate claim values (e.g., `"repo:{repository}:ref:{ref}"`).
                  Supports dot-path traversal (e.g., `{private_metadata.role}`).
                  Defaults to `{sub}`.
                type: string
              issuer:
                description: OIDC issuer URL (must match the `iss` claim in JWTs).
                type: string
              jwksUrl:
                description: |-
                  JWKS URL for fetching signing keys.
                  Defaults to `{issuer}/.well-known/jwks.json` if not specified.
                nullable: true
                type: string
              name:
                description: Human-readable name for this provider (used as prefix in requester_type).
                type: string
              policies:
                additionalProperties:
                  description: Per-role authorization policy.
                  properties:
                    allowedProfiles:
                      description: |-
                        Profile name patterns this role can claim (e.g., `["e2e-*"]`).
                        Supports `*` suffix wildcard and literal `*` for all profiles.
                      items:
                        type: string
                      type: array
                    defaultPriority:
                      default: 50
                      description: |-
                        Default priority for claims from this role.
                        Higher values are served first in the priority queue.
                      format: uint32
                      minimum: 0.0
                      type: integer
                    maxConcurrentClaims:
                      description: Maximum number of concurrent active claims.
                      format: uint32
                      minimum: 0.0
                      type: integer
                    maxExtensions:
                      default: 2
                      description: Maximum number of TTL extensions allowed.
                      format: uint32
                      minimum: 0.0
                      type: integer
                    maxTtl:
                      description: Maximum TTL for claims (e.g., "1h", "30m", "4h").
                      type: string
                  required:
                  - allowedProfiles
                  - maxConcurrentClaims
                  - maxTtl
                  type: object
                description: Per-role authorization policies. Keys are role names.
                type: object
              roleExtraction:
                description: How to extract the role from a JWT token.
                properties:
                  claim:
                    type: string
                  default:
                    type: string
                  method:
                    enum:
                    - static
                    - claim
                    - mapping
                    - conditional
                    type: string
                  role:
                    type: string
                  rules:
                    items:
                      description: |-
                        A conditional rule for role extraction.
                        Matches when a claim at `claim` equals `value`.
                      properties:
                        claim:
                          description: Claim path to check (supports dot-path).
                          type: string
                        role:
                          description: Role to assign if this rule matches.
                          type: string
                        value:
                          description: Value to match against.
                          type: string
                      required:
                      - claim
                      - role
                      - value
                      type: object
                    type: array
                  values:
                    additionalProperties:
                      type: string
                    type: object
                required:
                - method
                type: object
            required:
            - issuer
            - name
            - policies
            - roleExtraction
            type: object
        required:
        - spec
        title: AuthPolicy
        type: object
    served: true
    storage: true
    subresources: {}
