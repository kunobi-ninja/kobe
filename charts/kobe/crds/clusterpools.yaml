apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clusterpools.kobe.kunobi.ninja
spec:
  group: kobe.kunobi.ninja
  names:
    categories: []
    kind: ClusterPool
    plural: clusterpools
    shortNames:
    - cp
    singular: clusterpool
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.ready
      name: Ready
      type: integer
    - jsonPath: .status.leased
      name: Leased
      type: integer
    - jsonPath: .status.creating
      name: Creating
      type: integer
    - jsonPath: .status.consecutiveFailures
      name: Failures
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for ClusterPoolSpec via `CustomResource`
        properties:
          spec:
            description: |-
              ClusterPool defines a pool of pre-warmed virtual clusters.

              Each pool specifies cluster configuration, addons to install,
              resource limits, health checks, readiness gates, scaling behavior,
              and optional diagnostic capture settings.
            properties:
              addons:
                default: []
                description: Addons to install after cluster is running.
                items:
                  properties:
                    manifest:
                      description: Inline Kubernetes manifest YAML to apply after vcluster is ready.
                      nullable: true
                      type: string
                    name:
                      description: Human-readable name for the addon.
                      type: string
                    url:
                      description: URL to fetch manifest from (alternative to inline).
                      nullable: true
                      type: string
                  required:
                  - name
                  type: object
                type: array
              backend:
                default:
                  capi: null
                  datastore: null
                  type: k3s
                  vkobe: null
                description: Backend configuration for provisioning clusters.
                properties:
                  capi:
                    description: CAPI backend configuration (capi backend only).
                    nullable: true
                    properties:
                      infrastructureApiVersion:
                        description: API version of the infrastructure CRD (e.g. "infrastructure.cluster.x-k8s.io/v1alpha1").
                        type: string
                      infrastructureKind:
                        description: Kind of the infrastructure CRD (e.g. "VCluster", "K0smotronCluster").
                        type: string
                      infrastructurePlural:
                        description: |-
                          Optional explicit plural form for the infrastructure CRD resource name.
                          If not set, derived automatically by lowercasing the kind and appending "s".
                          Use this for kinds with irregular plurals (e.g. "ingresses" for "Ingress").
                        nullable: true
                        type: string
                      infrastructureSpec:
                        description: |-
                          Raw JSON/YAML spec to embed in the infrastructure resource.
                          This is provider-specific and passed through as-is.
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                    required:
                    - infrastructureApiVersion
                    - infrastructureKind
                    type: object
                  datastore:
                    description: Shared PostgreSQL datastore configuration (k3s/k0s backends only).
                    nullable: true
                    properties:
                      goldenTemplates:
                        default: false
                        description: Enable golden images via PostgreSQL template databases.
                        type: boolean
                      secretKey:
                        default: connection-url
                        description: 'Key in the Secret (default: "connection-url").'
                        type: string
                      secretRef:
                        description: Name of the Secret containing the PostgreSQL connection URL.
                        type: string
                    required:
                    - secretRef
                    type: object
                  type:
                    default: k3s
                    description: Backend type.
                    enum:
                    - k3s
                    - k0s
                    - capi
                    - vkobe
                    type: string
                  vkobe:
                    description: vkobe backend configuration (vkobe backend only).
                    nullable: true
                    properties:
                      dataStoreRef:
                        description: Reference to the KobeStore CRD that this cluster connects to.
                        properties:
                          name:
                            description: Name of the KobeStore resource in the same namespace.
                            type: string
                        required:
                        - name
                        type: object
                      kcm:
                        description: Optional KCM (kube-controller-manager) configuration.
                        nullable: true
                        properties:
                          controllers:
                            default:
                            - deployment
                            - replicaset
                            - statefulset
                            - daemonset
                            - job
                            - cronjob
                            - namespace
                            - serviceaccount
                            - garbagecollector
                            description: Which controllers to enable in the virtual KCM.
                            items:
                              type: string
                            type: array
                        type: object
                      metricsPort:
                        default: 9090
                        description: 'Port for health/metrics endpoints (default: 9090).'
                        format: uint16
                        maximum: 65535.0
                        minimum: 0.0
                        type: integer
                      proxyPort:
                        default: 8443
                        description: 'Port for the virtual API server proxy (default: 8443).'
                        format: uint16
                        maximum: 65535.0
                        minimum: 0.0
                        type: integer
                      syncers:
                        default:
                        - pods
                        - services
                        - configmaps
                        - secrets
                        - endpoints
                        - ingresses
                        description: Which resource syncers to enable. Defaults to core set.
                        items:
                          type: string
                        type: array
                      version:
                        default: '1.32'
                        description: Kubernetes version for the virtual kube-apiserver (e.g. "1.32").
                        type: string
                    required:
                    - dataStoreRef
                    type: object
                type: object
              bootstraps:
                default: []
                description: Reusable host-cluster bootstrap bundles to apply into each cluster.
                items:
                  properties:
                    name:
                      description: Name of the BootstrapConfig resource in the same namespace.
                      type: string
                    params:
                      additionalProperties:
                        type: string
                      default: {}
                      description: Optional renderer-specific parameters for this bootstrap.
                      type: object
                  required:
                  - name
                  type: object
                type: array
              cluster:
                description: Cluster configuration.
                properties:
                  agents:
                    description: |-
                      Number of k3s agent replicas (k3s backend only).
                      When set, creates a separate agent Deployment that joins the server.
                    format: uint32
                    minimum: 0.0
                    nullable: true
                    type: integer
                  clusterDomain:
                    description: |-
                      Kubernetes cluster DNS domain (defaults to `cluster.local`).
                      Used to build the FQDN of the cluster's API Service for the
                      agent's `--server` URL, the apiserver TLS SANs, and the
                      published kubeconfig.

                      Why this matters: the short name `{svc}.{ns}.svc` has 2 dots,
                      matching the typical `ndots:2` in resolv.conf. Resolvers then
                      query it as absolute first; Alpine/musl-based k3s and k0s
                      images don't fall back to `search` domains after that returns
                      NXDOMAIN and the agent's join silently fails. Using the FQDN
                      (4 dots) sidesteps the search-domain dance entirely.
                    nullable: true
                    type: string
                  expose:
                    description: Expose config (ingress/LoadBalancer/NodePort).
                    nullable: true
                    properties:
                      exposeType:
                        description: 'Expose type: "ingress", "NodePort", "LoadBalancer".'
                        type: string
                      ingressClassName:
                        description: Ingress class name (when expose_type="ingress").
                        nullable: true
                        type: string
                      nodePort:
                        description: NodePort number (when expose_type="NodePort").
                        format: int32
                        nullable: true
                        type: integer
                    required:
                    - exposeType
                    type: object
                  nodePlacement:
                    description: |-
                      Node placement strategy for the cluster's pods. When omitted, the
                      scheduler picks any eligible node independently for each pod.

                      Currently meaningful for the k3s backend, which has split server
                      and agent pods. For single-pod backends (vkobe) this is a no-op.
                    nullable: true
                    properties:
                      mode:
                        description: Placement mode.
                        enum:
                        - Any
                        - SameHost
                        type: string
                    required:
                    - mode
                    type: object
                  persistence:
                    description: Persistence config.
                    nullable: true
                    properties:
                      storageClassName:
                        description: Storage class name for dynamic provisioning.
                        nullable: true
                        type: string
                      storageRequestSize:
                        description: Storage request size (e.g., "10Gi").
                        nullable: true
                        type: string
                      storageType:
                        description: 'Storage type: "emptyDir", "dynamic", etc.'
                        nullable: true
                        type: string
                    type: object
                  serverArgs:
                    default: []
                    description: Extra k3s server args.
                    items:
                      type: string
                    type: array
                  servers:
                    default: 1
                    description: Number of control plane servers.
                    format: uint32
                    minimum: 0.0
                    type: integer
                  taints:
                    description: |-
                      Node taints applied to the cluster's control-plane node(s).

                      Semantics:
                      - **Field omitted** — backend default applies (e.g. k0s adds
                        `node-role.kubernetes.io/master:NoSchedule` when running
                        `controller --enable-worker`). Backward compatible.
                      - **Empty list `[]`** — no taints applied; any backend default is
                        suppressed. Useful for single-node CI/dev clusters where pods
                        need to schedule on the control-plane node.
                      - **Non-empty list** — exactly these taints are applied; backend
                        defaults are suppressed.

                      Currently honored by the k0s backend; other backends will gain
                      support over time.
                    items:
                      description: A single taint applied to cluster nodes. Mirrors `core/v1.Taint`.
                      properties:
                        effect:
                          description: Taint effect.
                          enum:
                          - NoSchedule
                          - PreferNoSchedule
                          - NoExecute
                          type: string
                        key:
                          description: Taint key (e.g. `dedicated`).
                          type: string
                        value:
                          description: Optional taint value (e.g. `gpu`).
                          nullable: true
                          type: string
                      required:
                      - effect
                      - key
                      type: object
                    nullable: true
                    type: array
                  version:
                    description: k3s version (e.g., "v1.31.3+k3s1").
                    type: string
                required:
                - version
                type: object
              diagnostics:
                description: Diagnostic bundle capture on claim release/expiry.
                nullable: true
                properties:
                  enabled:
                    default: false
                    description: Enable diagnostic capture on claim release/expiry.
                    type: boolean
                  includeSecrets:
                    default: false
                    description: Never capture secrets by default.
                    type: boolean
                  logLines:
                    default: 1000
                    description: Number of log lines to capture per container.
                    format: uint32
                    minimum: 0.0
                    type: integer
                  retentionDays:
                    default: 7
                    description: How long to keep diagnostic bundles.
                    format: uint32
                    minimum: 0.0
                    type: integer
                  storage:
                    description: S3 bucket URI (e.g. "s3://kunobi-diagnostics/").
                    type: string
                required:
                - storage
                type: object
              healthCheck:
                description: |-
                  Health check configuration for warm clusters.
                  Unhealthy clusters are automatically recycled.
                nullable: true
                properties:
                  failureThreshold:
                    default: 3
                    description: Consecutive failures before recycling a cluster.
                    format: uint32
                    minimum: 0.0
                    type: integer
                  intervalSeconds:
                    default: 30
                    description: How often to probe warm clusters, in seconds.
                    format: uint32
                    minimum: 0.0
                    type: integer
                type: object
              readinessGates:
                default: []
                description: |-
                  Readiness gates that must pass before a cluster enters the warm pool.
                  Clusters stay in Creating phase until all gates are satisfied.
                items:
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                    type:
                      enum:
                      - CRDExists
                      - DeploymentReady
                      - DaemonSetReady
                      - URLHealthy
                      - SchedulingProbe
                      type: string
                    url:
                      type: string
                  required:
                  - type
                  type: object
                type: array
              resources:
                description: Resource limits per cluster.
                nullable: true
                properties:
                  limits:
                    additionalProperties:
                      type: string
                    default: {}
                    type: object
                  requests:
                    additionalProperties:
                      type: string
                    default: {}
                    type: object
                type: object
              scaling:
                description: Autoscaling configuration. When set, overrides fixed `size`.
                nullable: true
                properties:
                  failureBackoff:
                    description: |-
                      Exponential backoff policy on consecutive provision failures.
                      When unset, sensible defaults apply (base 5s, multiplier 2, max 2m).
                      A broken pool that never reaches `Ready` caps at ~30 retries/hour.
                    nullable: true
                    properties:
                      base:
                        default: 5s
                        description: |-
                          Base delay before retrying after the first failure. Format: "5s", "30s", "2m".
                          Defaults to "5s" when unset.
                        type: string
                      max:
                        default: 2m
                        description: |-
                          Upper bound on the backoff delay. Prevents the retry interval from
                          growing unbounded on sustained failure. Format: "2m", "10m".
                          Defaults to "2m" when unset.
                        type: string
                      multiplier:
                        default: 2
                        description: |-
                          Exponential multiplier applied to the delay on each consecutive failure.
                          Defaults to 2 (binary exponential).
                        format: uint32
                        minimum: 0.0
                        type: integer
                    type: object
                  maxClusters:
                    default: 8
                    description: Hard ceiling on total clusters (warm + leased + creating).
                    format: uint32
                    minimum: 0.0
                    type: integer
                  minReady:
                    default: 1
                    description: Minimum number of warm (ready) clusters to maintain.
                    format: uint32
                    minimum: 0.0
                    type: integer
                  queueTimeout:
                    default: 5m
                    description: |-
                      Queue timeout for claims waiting when at max capacity.
                      Claims pending longer than this get 503. Format: "5m".
                    type: string
                  scaleDownAfter:
                    default: 5m
                    description: |-
                      Delete idle clusters after this duration if above `min_ready`.
                      Format: "30m", "1h", etc.
                    type: string
                  scaleUpThreshold:
                    default: 0
                    description: Scale up when ready clusters fall to this threshold.
                    format: uint32
                    minimum: 0.0
                    type: integer
                type: object
              size:
                default: 3
                description: |-
                  Desired number of warm (idle + creating) clusters in the pool.
                  Ignored when `scaling` is set — use `scaling.min_ready` instead.
                format: uint32
                minimum: 0.0
                type: integer
              snapshot:
                description: |-
                  Velero golden image snapshot configuration.
                  When enabled, the operator maintains a Velero backup of a golden cluster
                  and restores new pool members from it for faster provisioning.
                nullable: true
                properties:
                  enabled:
                    default: false
                    description: Enable golden image snapshotting via Velero.
                    type: boolean
                  goldenPrefix:
                    default: golden
                    description: Prefix for the golden backup name (e.g. "golden-<profile>").
                    type: string
                  refreshOn:
                    default: ProfileChange
                    description: When to refresh the golden image.
                    enum:
                    - ProfileChange
                    - Manual
                    type: string
                  storageLocation:
                    default: default
                    description: Velero BackupStorageLocation name to use.
                    type: string
                  ttl:
                    default: 720h
                    description: How long the Velero backup should be retained (e.g. "720h").
                    type: string
                  veleroNamespace:
                    default: velero
                    description: Namespace where the Velero server is installed.
                    type: string
                type: object
              ttl:
                default: 2h
                description: Default TTL for claims against this pool (e.g. "2h", "30m").
                type: string
              upgradePolicy:
                description: |-
                  Rolling-upgrade policy for drift recycling. When unset, a
                  conservative default applies: `maxRecycling=1, maxSurge=1`,
                  floor on `ready_clean` is `min_ready` (or `spec.size` for fixed
                  pools). See [`crate::pool::manager::compute_pool_actions`] for
                  the algorithm and `docs/guides/upgrade-policy.md` for the
                  operator-facing tuning guide.
                nullable: true
                properties:
                  maxRecycling:
                    default: 1
                    description: Maximum drifted instances to recycle per reconcile. Set to 0 to pause drift recycling. Default 1.
                    format: uint32
                    minimum: 0.0
                    type: integer
                  maxSurge:
                    default: 1
                    description: Extra clusters allowed above min_ready during rolling upgrade. Enables zero-downtime upgrade for size-1 pools. Default 1.
                    format: uint32
                    minimum: 0.0
                    type: integer
                  minReadyDuringUpgrade:
                    description: Floor on total Ready instances during upgrade. Defaults to min_ready (or spec.size). Set to 0 to recycle without a floor.
                    format: uint32
                    minimum: 0.0
                    nullable: true
                    type: integer
                type: object
            required:
            - cluster
            type: object
          status:
            nullable: true
            properties:
              consecutiveFailures:
                default: 0
                description: |-
                  Number of consecutive provision attempts that failed before any
                  instance reached `Ready`. Resets to 0 when any instance reaches `Ready`.
                  Drives the exponential backoff that slows down broken-pool create loops
                  so one misconfigured pool cannot hammer the API at full speed.
                format: uint32
                minimum: 0.0
                type: integer
              creating:
                default: 0
                description: Number of clusters being created.
                format: uint32
                minimum: 0.0
                type: integer
              goldenBackup:
                description: Name of the current golden Velero backup (e.g. "golden-myprofile-3").
                nullable: true
                type: string
              goldenGeneration:
                description: |-
                  The profile generation that the golden backup was created from.
                  Used to detect when a new snapshot is needed after spec changes.
                format: int64
                nullable: true
                type: integer
              goldenTemplateDb:
                description: Name of the PostgreSQL template database for golden images (k3s backend).
                nullable: true
                type: string
              lastFailureReason:
                description: |-
                  Short description of the last provision failure, for operator
                  observability. Typically the first line of the error chain.
                nullable: true
                type: string
              lastReadyMaxIndex:
                default: 0
                description: |-
                  Highest cluster index that has ever reached `Ready` in this pool's
                  lifetime. Sticky across reconciles. `consecutive_failures` is then
                  derived as `max_attempted_index - last_ready_max_index`, which
                  correctly counts failed attempts even during rapid churn.
                format: uint32
                minimum: 0.0
                type: integer
              leased:
                default: 0
                description: Number of clusters currently leased.
                format: uint32
                minimum: 0.0
                type: integer
              maxAttemptedIndex:
                default: 0
                description: |-
                  High-water mark of the highest cluster index this pool has ever
                  attempted to provision. Sticky across reconciles. Used together with
                  `last_ready_max_index` to detect rapid create→recycle churn that
                  would otherwise hide failures from `consecutive_failures` (which
                  only increments on a stable "all recycling, none creating" state —
                  a state that fast churn never produces because the next attempt
                  has already started).
                format: uint32
                minimum: 0.0
                type: integer
              nextAttemptAt:
                description: |-
                  Earliest time the pool manager may emit another `Create` action for
                  this pool (RFC3339). Set when `consecutive_failures > 0`. Cleared on
                  success or by explicit operator reset.
                nullable: true
                type: string
              phase:
                description: |-
                  High-level human-readable summary of a pool's current state.

                  Derived from the other status counts + backoff fields each reconcile.
                  Serves as the primary at-a-glance health indicator in `kubectl get
                  clusterpools` and in dashboards — prefer parsing specific fields (like
                  `ready`, `consecutiveFailures`) for programmatic decisions.
                enum:
                - Healthy
                - ScalingUp
                - ScalingDown
                - Backoff
                - Failing
                - Idle
                nullable: true
                type: string
              queueDepth:
                default: 0
                description: Current queue depth (claims waiting for clusters).
                format: uint32
                minimum: 0.0
                type: integer
              ready:
                default: 0
                description: Number of idle clusters ready for claims.
                format: uint32
                minimum: 0.0
                type: integer
              recycling:
                default: 0
                description: Number of clusters currently being recycled.
                format: uint32
                minimum: 0.0
                type: integer
              unhealthy:
                default: 0
                description: Number of clusters currently unhealthy and being recycled.
                format: uint32
                minimum: 0.0
                type: integer
            type: object
        required:
        - spec
        title: ClusterPool
        type: object
    served: true
    storage: true
    subresources:
      status: {}
