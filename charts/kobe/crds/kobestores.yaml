apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: kobestores.kobe.kunobi.ninja
spec:
  group: kobe.kunobi.ninja
  names:
    categories: []
    kind: KobeStore
    plural: kobestores
    shortNames:
    - ks
    singular: kobestore
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.driver
      name: Driver
      type: string
    - jsonPath: .status.ready
      name: Ready
      type: boolean
    - jsonPath: .status.currentClusters
      name: Clusters
      type: integer
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for KobeStoreSpec via `CustomResource`
        properties:
          spec:
            description: |-
              KobeStore represents an external storage backend (etcd or kine-sqlite)
              that virtual cluster kube-apiservers connect to via `--etcd-servers`
              and `--etcd-prefix`.
            properties:
              capacity:
                description: Capacity limits.
                properties:
                  maxClusters:
                    description: Maximum number of virtual clusters this KobeStore can serve.
                    format: uint32
                    minimum: 0.0
                    type: integer
                required:
                - maxClusters
                type: object
              driver:
                description: Storage driver type.
                enum:
                - etcd
                - kine-sqlite
                type: string
              endpoints:
                description: Endpoints to connect to (e.g. ["https://etcd-0:2379"]).
                items:
                  type: string
                type: array
              replicas:
                description: Number of replicas for the storage backend (relevant for etcd).
                format: uint32
                minimum: 0.0
                nullable: true
                type: integer
              tls:
                description: Optional TLS configuration for the connection.
                nullable: true
                properties:
                  secretRef:
                    description: |-
                      Name of the Kubernetes Secret containing TLS credentials
                      (ca.crt, tls.crt, tls.key).
                    type: string
                required:
                - secretRef
                type: object
            required:
            - capacity
            - driver
            - endpoints
            type: object
          status:
            description: Runtime status of a KobeStore.
            nullable: true
            properties:
              conditions:
                description: |-
                  Health conditions surfaced by the operator. Currently emitted:
                  `Healthy` — based on the backing workload's pod
                  `containerStatuses` (OOMKilled, restart pressure, NotReady).

                  Pattern follows core/v1 condition shape so `kubectl` and ops
                  tooling can read it consistently. The profile controller treats
                  `Healthy=False` as a signal to halt new ClusterInstance creates
                  against this store, breaking the bootstrap-fail-recycle loop
                  that compounds load on a degraded backend.

                  `skip_serializing_if = "Vec::is_empty"` avoids a JSON Merge
                  Patch dropping the field to `null` when other status writers
                  (e.g. the `ready` / `current_clusters` updater) re-emit status
                  without conditions of their own.
                items:
                  description: |-
                    One status condition on a KobeStore. Mirrors the core/v1 condition
                    shape (type/status/reason/message/lastTransitionTime) so kubectl
                    and operators see a familiar surface.
                  properties:
                    lastTransitionTime:
                      description: |-
                        RFC3339 of the last status change. Updated only when `status`
                        flips (True ↔ False ↔ Unknown), not on every reconcile, so
                        tools tailing `kubectl get -w` see meaningful events.
                      nullable: true
                      type: string
                    message:
                      description: |-
                        Human-readable detail. Includes the last failure timestamp and
                        any field operators need to triage without re-walking the
                        kubectl describe chain.
                      type: string
                    reason:
                      description: |-
                        Machine-readable reason. Examples for `Healthy=False`:
                        `MemoryPressure` (recent OOMKill), `RestartLoop` (≥3 restarts in window),
                        `NotReady` (containers not all ready), `WorkloadMissing` (referenced
                        Deployment/StatefulSet not found).
                      type: string
                    status:
                      description: 'One of: `True`, `False`, `Unknown`.'
                      type: string
                    type:
                      description: Condition name. Currently the only emitted value is `Healthy`.
                      type: string
                  required:
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              currentClusters:
                default: 0
                description: Number of virtual clusters currently using this KobeStore.
                format: uint32
                minimum: 0.0
                type: integer
              ready:
                default: false
                description: |-
                  Whether the KobeStore is reachable and healthy.
                  Kept for backward compatibility; new code should consult
                  `conditions[type=Healthy]` for richer reasons + messages.
                type: boolean
              usedBy:
                default: []
                description: List of virtual clusters using this KobeStore.
                items:
                  description: Identifies a virtual cluster using this KobeStore.
                  properties:
                    name:
                      description: Name of the virtual cluster.
                      type: string
                    namespace:
                      description: Namespace of the virtual cluster.
                      type: string
                  required:
                  - name
                  - namespace
                  type: object
                type: array
            type: object
        required:
        - spec
        title: KobeStore
        type: object
    served: true
    storage: true
    subresources:
      status: {}
