nameOverride: ""
fullnameOverride: ""

image:
  repository: zondax/kobe-operator
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

replicas: 2

logLevel: "kobe_operator=info"

# Namespace the operator manages (OPERATOR_NAMESPACE env var)
operatorNamespace: "kunobi-pool"

# Optional PostgreSQL connection for direct-k3s/k0s backends
postgres:
  url: ""

# kobe-sync sidecar image (used when operator creates virtual clusters)
kobeSync:
  image:
    repository: zondax/kobe-sync
    tag: ""  # defaults to same appVersion as operator

serviceAccount:
  name: ""
  annotations: {}

poolServiceAccount: ""
poolPublisherServiceAccount: ""

annotations: {}
podAnnotations: {}

securityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Cluster-side defense-in-depth policies. These are opt-in because they
# require Kubernetes features that may not be available in every cluster
# (ValidatingAdmissionPolicy is GA in K8s 1.30+).
clusterPolicies:
  # Restricts the operator's namespace deletion permission (granted
  # broadly by the ClusterRole, since RBAC cannot pattern-match names)
  # to namespaces matching `vcluster-*`. Defense-in-depth on top of the
  # in-process guard in `VclusterBackend::delete()`.
  #
  # Disabled by default to avoid breaking installs on clusters that
  # don't have the `admissionregistration.k8s.io/v1` VAP API (K8s
  # < 1.30). Cluster admins on supported versions should set
  # `clusterPolicies.namespaceDeletionRestriction.enabled: true`.
  namespaceDeletionRestriction:
    enabled: false

service:
  type: ClusterIP
  port: 8080
  nodePort: null

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

probes:
  startup:
    failureThreshold: 180
    periodSeconds: 2

nodeSelector: {}
tolerations: []
affinity: {}

serviceMonitor:
  enabled: false
  interval: 30s
  labels: {}

podDisruptionBudget:
  enabled: false
  # minAvailable: 1
  # maxUnavailable: 1

networkPolicy:
  enabled: false
  apiServerCIDR: 0.0.0.0/0
  egressCIDRs:
    - 0.0.0.0/0

# -----------------------------------------------------------------------------
# Ingress — expose the kobe HTTP API externally.
#
# Opt-in. When enabled, the chart creates a networking.k8s.io/v1 Ingress
# routing `host` to the kobe Service. Supports TLS via an explicit
# pre-existing Secret or one managed by cert-manager via the annotation
# `cert-manager.io/cluster-issuer`.
# -----------------------------------------------------------------------------
ingress:
  enabled: false
  className: ""
  host: ""
  path: /
  pathType: Prefix
  annotations: {}
  # Example with cert-manager:
  #   annotations:
  #     cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    enabled: true
    secretName: ""     # defaults to "<release>-tls" when empty

# -----------------------------------------------------------------------------
# Datastores — state backends for vkobe virtual clusters.
#
# Each vkobe pool needs a KobeStore to persist cluster state. Two built-in
# options: etcd (full cluster, HA) or Kine+SQLite (single replica, lightweight).
# Both can be deployed by the chart OR wired to an external instance.
#
# The chart auto-creates the KobeStore CR so pools can reference it by name.
# -----------------------------------------------------------------------------

# etcd datastore. Three possible states:
#   enabled: false                   → no etcd (default)
#   enabled: true + bundled: true    → chart deploys bitnami/etcd subchart
#   enabled: true + bundled: false   → external etcd; endpoints[] must be set
etcd:
  enabled: false
  bundled: false
  endpoints: []
  #   - http://my-etcd.platform.svc:2379

  # Subchart values (apply only when bundled: true). Forwarded to bitnami/etcd.
  replicaCount: 3
  auth:
    rbac:
      create: false
  persistence:
    size: 8Gi

  # KobeStore config (applies whenever enabled: true).
  # storeName: ""          # defaults to "<release>-etcd"
  maxClusters: 50

# Lightweight Kine + SQLite datastore (single replica, PVC-backed).
# Suitable for dev, CI, and small production workloads where HA isn't needed.
# SQLite is single-writer, so this cannot scale beyond one replica.
# For an external Kine (PostgreSQL-backed, etc.) use kobeStores[] instead.
kine:
  enabled: false
  # storeName: ""          # defaults to "<release>-kine"
  image: rancher/kine:v0.13.2
  imagePullPolicy: IfNotPresent
  storage: 5Gi
  # storageClassName: ""    # uses cluster default if unset
  maxClusters: 20
  resources:
    # Kine is a SQLite-on-network shim and is far more sensitive to CPU
    # throttling than typical etcd: every kube-apiserver bootstrap fans out
    # hundreds of concurrent writes that all serialize through Kine's SQL
    # connection pool. Empirically, 500m hits the throttle limit during a
    # single vkobe pool member coming up alongside a steady-state one,
    # producing "context deadline exceeded" txn errors. 2 cores leaves
    # ample headroom.
    #
    # Memory follows the same shape: under concurrent bootstrap load
    # (ServiceAccounts, CRDs, CertManager, Flux components — all writing
    # simultaneously) kine's SQLite WAL, connection pool buffers, and
    # query plan cache push memory well past 512Mi. Hitting the limit
    # OOMKills the pod, which causes apiserver lease renewals in every
    # dependent vkobe instance to time out (5s deadline), kube-controller-
    # manager loses its lease and shuts down, the bootstrap Job fails,
    # the ClusterPool recycles the instance, the new instance triggers
    # more bootstrap load on a freshly-restarted kine, and the cycle
    # repeats — observed in production with 10+ kine restarts in a day,
    # all OOMKilled, every vkobe-flux pool member stuck in a
    # bootstrap-fail-recycle loop.
    #
    # 2Gi limit is conservative for the documented `maxClusters: 20`
    # and proportional to the CPU bump above. 256Mi request gives
    # scheduler enough signal not to over-pack the node when kine is
    # actively serving traffic.
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "2"
      memory: "2Gi"
  nodeSelector: {}
  tolerations: []

# -----------------------------------------------------------------------------
# KobeStore CRs for external / bring-your-own datastores. Use when the target
# etcd/kine is managed outside the chart (shared across pools, pre-existing
# cluster, etc.).
#
# Example:
#   kobeStores:
#     - name: external-etcd
#       driver: etcd
#       endpoints:
#         - http://etcd.shared.svc:2379
#       capacity:
#         maxClusters: 100
#       replicas: 3
# -----------------------------------------------------------------------------
kobeStores: []

# -----------------------------------------------------------------------------
# Static IPAM reservations.
#
# kobe's IPAM allocator hands `/20` slices to each leased k3s/k0s guest from
# the hardcoded `10.240.0.0/13` (service) + `10.248.0.0/13` (cluster) space.
# This list lets you pin specific slices out of the rotation — the IPAM
# controller will never assign them to a guest. Each entry renders as a
# CIDRClaim with `helm.sh/resource-policy: keep`, so reservations survive
# helm uninstalls (drop them here AND `kubectl delete cidrclaim <name>` to
# release back into the rotation).
#
# Use case: corporate VPN, external peer clusters, legacy bare-metal
# deployments — anything already living in the IPAM block.
#
# Both CIDRs MUST be aligned to /20 boundaries inside the parent blocks; an
# unaligned reservation lands in `Conflict` and is logged.
#
# Example:
#   cidrReservations:
#     - name: reserved-corp-vpn
#       serviceCidr: 10.240.32.0/20
#       clusterCidr: 10.248.32.0/20
# -----------------------------------------------------------------------------
cidrReservations: []

# -----------------------------------------------------------------------------
# IPAM address plan (issue #42).
#
# kobe carves every guest k3s/k0s service+cluster CIDR out of two parent
# supernets. The built-in default is 10.240.0.0/13 (service) + 10.248.0.0/13
# (cluster), /20 slots — well clear of the common k8s ranges. Leave this block
# empty to use that default (the case for almost every deployment).
#
# Set it only when the HOST cluster's own service range overlaps the default:
# in that case a guest's in-pod 10.x.0.1 routes to the HOST apiserver and guest
# CoreDNS fails with `x509: certificate signed by unknown authority`. Relocating
# the supernets off the colliding range fixes it. When `serviceCidr` AND
# `clusterCidr` are both set, the chart creates a `CIDRPool/default` the operator
# reads at startup. Both supernets must be aligned to their prefix and must NOT
# overlap the host cluster's ranges.
#
# Example (host cluster uses 10.240.0.0/13, so move kobe to 100.64.0.0/13):
#   ipam:
#     serviceCidr: 100.64.0.0/13
#     serviceSlotPrefix: 20
#     clusterCidr: 100.72.0.0/13
#     clusterSlotPrefix: 20
ipam:
  serviceCidr: ""        # empty = built-in 10.240.0.0/13
  serviceSlotPrefix: 20
  clusterCidr: ""        # empty = built-in 10.248.0.0/13
  clusterSlotPrefix: 20

# -----------------------------------------------------------------------------
# kobe-host-reaper DaemonSet. Always-on by default. Disable on clusters
# where no ClusterPool uses `kubeletSharedMount`. Per-node DaemonSet that
# unmounts and rm -rf's stale subtrees under `/var/lib/kobe/leases/`,
# gated by the operator-written `kobe-live-instances` ConfigMap.
# -----------------------------------------------------------------------------
hostReaper:
  enabled: true
  # Override only if the operator image and the reaper image diverge.
  image:
    repository: ""  # falls back to .Values.image.repository
    tag: ""        # falls back to .Values.image.tag
  leaseRoot: /var/lib/kobe/leases
  reconcileInterval: 30s
  mtimeSkip: 120s
  dryRun: false
  # If true, the reaper container starts with KOBE_REAPER_DISABLE=1 set,
  # turning the sweep loop into a no-op (logs once per interval).
  # Operators can flip this in-place via `kubectl set env ds/...`.
  disable: false
  namespacePsaLabels: true
  tolerations:
    - operator: Exists
  resources:
    limits:
      cpu: 100m
      memory: 64Mi
    requests:
      cpu: 10m
      memory: 32Mi
