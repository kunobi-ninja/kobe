nameOverride: ""
fullnameOverride: ""

image:
  repository: zondax/kobe-operator
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

replicas: 2

logLevel: "kobe_operator=info"

# Namespace the operator manages (OPERATOR_NAMESPACE env var)
operatorNamespace: "kunobi-pool"

# Optional PostgreSQL connection for direct-k3s/k0s backends
postgres:
  url: ""

# kobe-sync sidecar image (used when operator creates virtual clusters)
kobeSync:
  image:
    repository: zondax/kobe-sync
    tag: ""  # defaults to same appVersion as operator

serviceAccount:
  name: ""
  annotations: {}

poolServiceAccount: ""
poolPublisherServiceAccount: ""

annotations: {}
podAnnotations: {}

securityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080
  nodePort: null

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

probes:
  startup:
    failureThreshold: 180
    periodSeconds: 2

nodeSelector: {}
tolerations: []
affinity: {}

serviceMonitor:
  enabled: false
  interval: 30s
  labels: {}

podDisruptionBudget:
  enabled: false
  # minAvailable: 1
  # maxUnavailable: 1

networkPolicy:
  enabled: false
  apiServerCIDR: 0.0.0.0/0
  egressCIDRs:
    - 0.0.0.0/0

# -----------------------------------------------------------------------------
# Ingress — expose the kobe HTTP API externally.
#
# Opt-in. When enabled, the chart creates a networking.k8s.io/v1 Ingress
# routing `host` to the kobe Service. Supports TLS via an explicit
# pre-existing Secret or one managed by cert-manager via the annotation
# `cert-manager.io/cluster-issuer`.
# -----------------------------------------------------------------------------
ingress:
  enabled: false
  className: ""
  host: ""
  path: /
  pathType: Prefix
  annotations: {}
  # Example with cert-manager:
  #   annotations:
  #     cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    enabled: true
    secretName: ""     # defaults to "<release>-tls" when empty

# -----------------------------------------------------------------------------
# Datastores — state backends for vkobe virtual clusters.
#
# Each vkobe pool needs a KobeStore to persist cluster state. Two built-in
# options: etcd (full cluster, HA) or Kine+SQLite (single replica, lightweight).
# Both can be deployed by the chart OR wired to an external instance.
#
# The chart auto-creates the KobeStore CR so pools can reference it by name.
# -----------------------------------------------------------------------------

# etcd datastore. Three possible states:
#   enabled: false                   → no etcd (default)
#   enabled: true + bundled: true    → chart deploys bitnami/etcd subchart
#   enabled: true + bundled: false   → external etcd; endpoints[] must be set
etcd:
  enabled: false
  bundled: false
  endpoints: []
  #   - http://my-etcd.platform.svc:2379

  # Subchart values (apply only when bundled: true). Forwarded to bitnami/etcd.
  replicaCount: 3
  auth:
    rbac:
      create: false
  persistence:
    size: 8Gi

  # KobeStore config (applies whenever enabled: true).
  # storeName: ""          # defaults to "<release>-etcd"
  maxClusters: 50

# Lightweight Kine + SQLite datastore (single replica, PVC-backed).
# Suitable for dev, CI, and small production workloads where HA isn't needed.
# SQLite is single-writer, so this cannot scale beyond one replica.
# For an external Kine (PostgreSQL-backed, etc.) use kobeStores[] instead.
kine:
  enabled: false
  # storeName: ""          # defaults to "<release>-kine"
  image: rancher/kine:v0.13.2
  imagePullPolicy: IfNotPresent
  storage: 5Gi
  # storageClassName: ""    # uses cluster default if unset
  maxClusters: 20
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  nodeSelector: {}
  tolerations: []

# -----------------------------------------------------------------------------
# KobeStore CRs for external / bring-your-own datastores. Use when the target
# etcd/kine is managed outside the chart (shared across pools, pre-existing
# cluster, etc.).
#
# Example:
#   kobeStores:
#     - name: external-etcd
#       driver: etcd
#       endpoints:
#         - http://etcd.shared.svc:2379
#       capacity:
#         maxClusters: 100
#       replicas: 3
# -----------------------------------------------------------------------------
kobeStores: []


