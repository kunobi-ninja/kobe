apiVersion: v2
name: kobe
description: >-
  Kubernetes operator for instant cluster provisioning via warm pools.
  Supports multiple backends: k3s, k0s, CAPI, and kobe-sync.
type: application
version: 0.21.17
appVersion: "0.33.0"
keywords:
  - kubernetes
  - operator
  - cluster-pool
  - virtual-cluster
  - kobe-sync
home: https://github.com/kunobi-ninja/kobe
sources:
  - https://github.com/kunobi-ninja/kobe
maintainers:
  - name: Zondax
    url: https://zondax.ch
dependencies:
  - name: etcd
    version: "~10.0"
    repository: https://charts.bitnami.com/bitnami
    condition: etcd.bundled
