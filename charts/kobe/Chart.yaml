apiVersion: v2
name: kobe
description: >-
  Kubernetes operator for instant cluster provisioning via warm pools.
  Supports multiple backends: k3k, direct-k3s, direct-k0s, CAPI, and kobe-sync.
type: application
version: 0.1.0
appVersion: "0.1"
keywords:
  - kubernetes
  - operator
  - cluster-pool
  - virtual-cluster
  - kobe-sync
home: https://github.com/kunobi-ninja/kobe
sources:
  - https://github.com/kunobi-ninja/kobe
maintainers:
  - name: Zondax
    url: https://zondax.ch
dependencies:
  - name: etcd
    version: "~10.0"
    repository: https://charts.bitnami.com/bitnami
    condition: etcd.enabled
