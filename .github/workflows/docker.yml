name: Build and Push Docker

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile'
      - 'docker-bake.hcl'
      - '.github/workflows/docker.yml'
      - 'VERSION'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: kunobi-runners
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "full=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        env:
          IMAGE_TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.full }}
          BUILD_VERSION: ${{ steps.version.outputs.tag }}
          BUILD_COMMIT: ${{ github.sha }}
          BUILD_DATE: ${{ steps.version.outputs.tag }}
        run: docker buildx bake -f docker-bake.hcl push

      # - name: Trigger deploy
      #   run: |
      #     curl -sf -X POST https://wagyu-watcher.an internal cluster.zondax.io/trigger \
      #       || echo "Deploy trigger failed — watcher will poll within 5 min"
