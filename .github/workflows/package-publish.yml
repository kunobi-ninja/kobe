name: Package Publish

# Publishes the kobe CLI to OS package managers after a GitHub release:
#   - apt    : Debian repo on Cloudflare R2 (served at https://r2.kunobi.com/kobe/apt/)
#   - brew   : Homebrew formula via repo-dispatch to kunobi-ninja/homebrew-kunobi
#   - winget : komac PR to microsoft/winget-pkgs (GATED on vars.ENABLE_WINGET)
#
# Mirrors kache's package-publish.yml (same shared signing infra + R2 bucket,
# kobe-namespaced paths). Triggered when a release is published, or manually via
# workflow_dispatch (to re-run one track or backfill an older release).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.31.14, 0.32.0-rc.1, or "latest")'
        required: false
        type: string
        default: 'latest'
      channel:
        description: 'Release channel (auto-detected from version if "auto")'
        required: false
        type: choice
        options:
          - auto
          - stable
          - unstable
        default: 'auto'
      only:
        description: 'Which tracks to run'
        required: false
        type: choice
        options:
          - all
          - apt
          - brew
          - winget
          - scoop
        default: 'all'

# OIDC for GCP WIF (KMS PGP signing); read-only repo contents; actions:read so
# the `gate` job's require-ci-green.sh can read CI run/job conclusions via the
# Actions API (denied with the default contents-only token).
permissions:
  id-token: write
  contents: read
  actions: read

env:
  GH_OWNER: kunobi-ninja
  GH_REPO: kobe

jobs:
  # ---------------------------------------------------------------------------
  # Resolve version + channel. On a release event the tag drives both; on
  # workflow_dispatch the inputs do (with "latest"/"auto" resolution).
  # ---------------------------------------------------------------------------
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      channel: ${{ steps.resolve.outputs.channel }}
    steps:
      - name: Checkout (for scripts)
        uses: actions/checkout@v4

      - name: Resolve version and channel
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.version }}
          CHANNEL: ${{ github.event_name == 'release' && 'auto' || inputs.channel }}
        run: bash scripts/ci/resolve-version.sh

  # ---------------------------------------------------------------------------
  # Gate — wait for the release build to finish UPLOADING assets before any
  # publisher runs. kobe's `release-cli` job (in ci.yml) builds + signs + uploads
  # the .deb / .exe / tarballs AFTER the GitHub Release is published (which fires
  # this workflow), so on a release event the assets briefly don't exist yet.
  # Block on `release-cli / Upload release assets` going green. Skipped on
  # workflow_dispatch backfills, where the release already has its assets.
  # ---------------------------------------------------------------------------
  gate:
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout (for scripts)
        uses: actions/checkout@v4
      - name: Wait for the release build to finish uploading assets
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          # CI gates + cross-build (incl. Windows xwin) + sign + upload can
          # approach ~40m; give headroom: 120 × 30s = 60m.
          CI_GREEN_MAX_ATTEMPTS: "120"
        run: ./scripts/require-ci-green.sh "${{ github.sha }}" "release-cli / Upload release assets"

  # ---------------------------------------------------------------------------
  # apt — build + sign the Debian repo and publish to R2.
  # ---------------------------------------------------------------------------
  apt:
    needs: [resolve, gate]
    if: ${{ github.event_name == 'release' || inputs.only == 'all' || inputs.only == 'apt' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install apt-repo tooling
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends reprepro rclone gnupg dpkg-dev

      - name: Setup PGP KMS signing
        id: pgp-kms
        uses: ./.github/actions/setup-pgp-kms-signing
        with:
          workload-identity-provider: ${{ secrets.PGP_SIGN_WIF_PROVIDER }}
          gcp-project-id: ${{ secrets.PGP_SIGN_GCP_PROJECT_ID }}
          service-account: ${{ secrets.PGP_SIGN_SERVICE_ACCOUNT }}
          gh-pat: ${{ secrets.GH_PAT_KUNOBI_NINJA_RELEASES }}
          cert-base64: ${{ secrets.PGP_CERT_BASE64 }}

      - name: Download .deb assets from the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/debs
          # .deb assets are attached by the release-cli build_deb step.
          # Names: kobe_<version>_{amd64,arm64}.deb
          gh release download "v${VERSION}" \
            --repo "${GH_OWNER}/${GH_REPO}" \
            --pattern 'kobe_*_amd64.deb' \
            --pattern 'kobe_*_arm64.deb' \
            --dir /tmp/debs
          echo "Downloaded:"
          ls -la /tmp/debs

      - name: Generate APT repo with reprepro
        env:
          KMS_KEY: ${{ secrets.PGP_SIGN_KMS_KEY_VERSION }}
          CERT_PATH: ${{ steps.pgp-kms.outputs.cert-path }}
          APT_CHANNEL: ${{ needs.resolve.outputs.channel }}
          CONF_DIR: ./apt_config
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: ./scripts/apt/generate-repo.sh

      - name: Validate repository
        env:
          APT_CHANNEL: ${{ needs.resolve.outputs.channel }}
          CERT_PATH: ${{ steps.pgp-kms.outputs.cert-path }}
        run: ./scripts/apt/validate.sh

      - name: Publish to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          APT_CHANNEL: ${{ needs.resolve.outputs.channel }}
        run: ./scripts/apt/publish.sh

      - name: Smoke test live URLs
        env:
          APT_CHANNEL: ${{ needs.resolve.outputs.channel }}
          CERT_PATH: ${{ steps.pgp-kms.outputs.cert-path }}
        run: ./scripts/apt/smoke-test.sh

  # ---------------------------------------------------------------------------
  # brew — dispatch a formula update to the existing tap homebrew-kunobi.
  # macOS + Linux formula (arm64 + x86_64 each; Linux uses the musl tarballs).
  # The receiver writes Formula/kobe.rb (stable) or Formula/kobe-unstable.rb.
  # ---------------------------------------------------------------------------
  brew:
    needs: [resolve, gate]
    if: ${{ github.event_name == 'release' || inputs.only == 'all' || inputs.only == 'brew' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download macOS + Linux tarball checksums from the release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          set -euo pipefail
          gh release download "v${VERSION}" \
            --repo "${GH_OWNER}/${GH_REPO}" \
            --pattern 'kobe-x86_64-apple-darwin.tar.gz.sha256' \
            --pattern 'kobe-aarch64-apple-darwin.tar.gz.sha256' \
            --pattern 'kobe-x86_64-unknown-linux-musl.tar.gz.sha256' \
            --pattern 'kobe-aarch64-unknown-linux-musl.tar.gz.sha256' \
            --dir /tmp/sha

      - name: Extract SHA256 values
        id: sha
        run: |
          set -euo pipefail
          SHA_X86=$(cut -d ' ' -f1 < /tmp/sha/kobe-x86_64-apple-darwin.tar.gz.sha256)
          SHA_ARM=$(cut -d ' ' -f1 < /tmp/sha/kobe-aarch64-apple-darwin.tar.gz.sha256)
          SHA_LINUX_X86=$(cut -d ' ' -f1 < /tmp/sha/kobe-x86_64-unknown-linux-musl.tar.gz.sha256)
          SHA_LINUX_ARM=$(cut -d ' ' -f1 < /tmp/sha/kobe-aarch64-unknown-linux-musl.tar.gz.sha256)
          if [[ -z "$SHA_X86" || -z "$SHA_ARM" || -z "$SHA_LINUX_X86" || -z "$SHA_LINUX_ARM" ]]; then
            echo "Error: missing macOS or Linux SHA256 values" >&2
            exit 1
          fi
          {
            echo "x86_64=$SHA_X86"
            echo "aarch64=$SHA_ARM"
            echo "linux_x86_64=$SHA_LINUX_X86"
            echo "linux_aarch64=$SHA_LINUX_ARM"
          } >> "$GITHUB_OUTPUT"

      - name: Trigger Homebrew formula update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_DISPATCH_TOKEN }}
          repository: kunobi-ninja/homebrew-kunobi
          event-type: update-kobe-formula
          client-payload: |
            {
              "version": "${{ needs.resolve.outputs.version }}",
              "channel": "${{ needs.resolve.outputs.channel }}",
              "sha256_x86_64": "${{ steps.sha.outputs.x86_64 }}",
              "sha256_aarch64": "${{ steps.sha.outputs.aarch64 }}",
              "sha256_linux_x86_64": "${{ steps.sha.outputs.linux_x86_64 }}",
              "sha256_linux_aarch64": "${{ steps.sha.outputs.linux_aarch64 }}"
            }

  # ---------------------------------------------------------------------------
  # winget — submit a komac PR to microsoft/winget-pkgs. GATED behind the repo
  # variable `ENABLE_WINGET` (set it to 'true' only AFTER a windows-msvc build of
  # `-p kobe-ctl` is proven green and `kunobi-ninja.kobe` is bootstrapped once
  # with `komac new`). Until then this job is skipped on every release, so a
  # Windows issue can't block apt/brew/crates/nix.
  # Installer shape: bare signed .exe as InstallerType: portable.
  # ---------------------------------------------------------------------------
  winget:
    needs: [resolve, gate]
    if: ${{ vars.ENABLE_WINGET == 'true' && (github.event_name == 'release' || inputs.only == 'all' || inputs.only == 'winget') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Install komac
        env:
          KOMAC_VERSION: "2.15.0"
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/russellbanks/Komac/releases/download/v${KOMAC_VERSION}/komac-${KOMAC_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | sudo tar xz -C /usr/local/bin komac
          komac --version

      - name: Resolve PackageIdentifier from channel
        id: pkg
        env:
          CHANNEL: ${{ needs.resolve.outputs.channel }}
        run: |
          set -euo pipefail
          case "$CHANNEL" in
            stable)
              echo "id=kunobi-ninja.kobe"          >> "$GITHUB_OUTPUT"
              ;;
            unstable)
              echo "id=kunobi-ninja.kobe.Unstable" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Error: unknown channel '$CHANNEL' (expected stable or unstable)" >&2
              exit 1
              ;;
          esac

      - name: Verify Windows portable .exe assets are accessible
        id: urls
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          set -euo pipefail
          BASE="https://github.com/${GH_OWNER}/${GH_REPO}/releases/download/v${VERSION}"
          URL_X64="${BASE}/kobe-x86_64-pc-windows-msvc.exe"
          URL_ARM="${BASE}/kobe-aarch64-pc-windows-msvc.exe"
          for url in "$URL_X64" "$URL_ARM"; do
            HTTP_STATUS=$(curl -o /dev/null -w "%{http_code}" -L --head -fsS "$url" || true)
            if [[ "$HTTP_STATUS" != "200" ]]; then
              echo "Error: installer not found at $url (HTTP $HTTP_STATUS)" >&2
              exit 1
            fi
            echo "Verified $url"
          done
          echo "x64=$URL_X64" >> "$GITHUB_OUTPUT"
          echo "arm64=$URL_ARM" >> "$GITHUB_OUTPUT"

      - name: Submit winget manifest update
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
          PACKAGE_ID: ${{ steps.pkg.outputs.id }}
          URL_X64: ${{ steps.urls.outputs.x64 }}
          URL_ARM: ${{ steps.urls.outputs.arm64 }}
          RELEASE_NOTES_URL: ${{ github.event.release.html_url }}
          GITHUB_TOKEN: ${{ secrets.WINGET_TOKEN }}
          KOMAC_FORK_OWNER: kunobi-ninja
        run: |
          set -euo pipefail
          NOTES_URL="${RELEASE_NOTES_URL:-}"
          if [[ -z "$NOTES_URL" ]]; then
            NOTES_URL="https://github.com/${GH_OWNER}/${GH_REPO}/releases/tag/v${VERSION}"
          fi
          # NOTE: the very first submission of a brand-new id must be bootstrapped
          # with `komac new` (not `update`). WINGET_TOKEN must be a CLASSIC PAT
          # with public_repo scope.
          komac update "$PACKAGE_ID" \
            --urls "$URL_X64" "$URL_ARM" \
            --version "$VERSION" \
            --release-notes-url "$NOTES_URL" \
            --submit

  # ---------------------------------------------------------------------------
  # scoop — kick the self-hosted Scoop bucket (kunobi-ninja/scoop-bucket) to
  # autoupdate. The bucket's Excavator workflow runs checkver + autoupdate: it
  # discovers the new version from GitHub Releases and pulls hashes from the
  # .sha256 sidecars, so no version/hash payload is needed here — just the kick.
  # One dispatch re-excavates every manifest; only the one whose version changed
  # is committed (updates the kobe manifest on a kobe release).
  # ---------------------------------------------------------------------------
  scoop:
    needs: [resolve, gate]
    if: ${{ github.event_name == 'release' || inputs.only == 'all' || inputs.only == 'scoop' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger Scoop bucket autoupdate
        uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0 # v3.0.0
        with:
          # SCOOP_DISPATCH_TOKEN: PAT with contents:write on kunobi-ninja/scoop-bucket
          # (classic `repo`, or a fine-grained token scoped to that repo). Distinct
          # from HOMEBREW_DISPATCH_TOKEN — this one targets the Scoop bucket.
          token: ${{ secrets.SCOOP_DISPATCH_TOKEN }}
          repository: kunobi-ninja/scoop-bucket
          event-type: release
