name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "crates/**"
      - "charts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "docker/**"
      - "docker-bake.hcl"
      - "hack/**"
      - "scripts/**"
      - "apt_config/**"
      - "nix/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/ci.yml"
      - ".github/workflows/package-publish.yml"
      - ".github/workflows/publish-crates.yaml"
  push:
    branches: [main]
    paths:
      - "src/**"
      - "crates/**"
      - "charts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "docker/**"
      - "docker-bake.hcl"
      - "hack/**"
      - "scripts/**"
      - "apt_config/**"
      - "nix/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/ci.yml"
      - ".github/workflows/package-publish.yml"
      - ".github/workflows/publish-crates.yaml"
  release:
    types: [published]
  workflow_dispatch:
  # Nightly trigger for the slow privileged-k3s e2e gate (see the `e2e` job).
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Rust Checks
    runs-on: kunobi-runners
    container:
      # Toolchain floor is driven by `kunobi-ha` (≥ 1.94 since kunobi-ha
      # repointed its MSRV in their #6). Bump together with that crate
      # whenever a newer stable lands; kobe itself only requires the
      # `rust-version` declared in Cargo.toml.
      image: rust:1.94-bookworm
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Add Rust components
        run: rustup component add rustfmt clippy

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        # --workspace so the kobectl member is linted too (not just the operator).
        run: cargo clippy --workspace -- -D warnings

      - name: Tests
        run: cargo test --workspace

      - name: Security audit
        run: |
          cargo install cargo-audit --locked || true
          cargo audit \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2024-0436 \
            --ignore RUSTSEC-2025-0134 \
            --ignore RUSTSEC-2026-0002 \
            --ignore RUSTSEC-2026-0097 \
            --ignore RUSTSEC-2026-0098 \
            --ignore RUSTSEC-2026-0099 \
            --ignore RUSTSEC-2026-0104

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Verify Helm chart renders
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm dependency build charts/kobe/
          helm template kobe charts/kobe/ --debug > /dev/null

      - name: Verify CRDs match generated output
        run: |
          for crd in clusterpools clusterleases accesspolicies kobestores cidrpools; do
            cargo run --quiet --bin crdgen -- "$crd" > "/tmp/${crd}-generated.yaml"
            diff -u "/tmp/${crd}-generated.yaml" "charts/kobe/crds/${crd}.yaml" || {
              echo "::error::CRD '${crd}' is out of date. Run 'cargo run --bin crdgen -- ${crd} > charts/kobe/crds/${crd}.yaml' to update."
              exit 1
            }
          done

  docker-dry-run:
    if: github.event_name == 'pull_request'
    needs: checks
    runs-on: kunobi-runners
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      # Authenticated pulls avoid Docker Hub's anonymous rate limit (~100/6h per
      # IP), which the shared self-hosted runner egress IP intermittently trips —
      # surfacing as a 429 on the base-image pull. `publish` already logs in; the
      # dry-run did not. `continue-on-error` keeps fork PRs (no secrets) working
      # via anonymous pulls, exactly as before.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        continue-on-error: true
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all images (dry-run, no cache)
        run: docker buildx bake -f docker-bake.hcl --set '*.cache-from='

  # Provision→Ready→recycle smoke gate against a REAL single-server k3s cluster
  # running nested-in-pod inside plain kind, with the operator installed via the
  # real Helm chart (so its real rbac.yaml is in effect). Catches two regression
  # classes unit tests can't see: the k3s readiness-probe class (members never
  # go Ready) and the RBAC-403 recycle-wedge class (instances stuck Recycling).
  #
  # PHASE 1: nightly + manual ONLY — slow and new, not yet a PR-required check.
  # No `container:` block: like `docker-dry-run`, this needs the host Docker
  # socket for kind + buildx, so it runs directly on the self-hosted runner.
  e2e:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    needs: [checks]
    runs-on: kunobi-runners
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # Provides bun + helm + kind + just (and rust, per mise.toml). The e2e
      # harness resolves these via `mise which`, and `just` runs the recipe.
      - name: Set up mise tools
        uses: jdx/mise-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Parameterize the kind cluster name with the run id so concurrent/
      # persistent self-hosted runs never collide on a shared cluster name.
      - name: Bring up the e2e harness (kind + chart + pools)
        run: mise exec -- bun run ./hack/e2e.ts up --cluster e2e-${{ github.run_id }}

      - name: Run the k3s provision→Ready→recycle smoke gate
        run: mise exec -- just test-smoke-k3s e2e-${{ github.run_id }}

      - name: Diagnostics on failure
        if: failure()
        run: |
          CTX=kind-e2e-${{ github.run_id }}
          kubectl --context "$CTX" get pods,clusterinstances,clusterpools -A -o wide || true
          kubectl --context "$CTX" logs -n kobe-system -l app.kubernetes.io/name=kobe --tail 200 --all-containers || true
          mkdir -p /tmp/kind-logs
          mise exec -- kind export logs /tmp/kind-logs --name e2e-${{ github.run_id }} || true

      - name: Upload kind logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kind-logs-${{ github.run_id }}
          path: /tmp/kind-logs
          if-no-files-found: ignore

      # Always tear down so kind clusters never leak on the persistent runner.
      - name: Tear down the e2e harness
        if: always()
        run: mise exec -- bun run ./hack/e2e.ts down --cluster e2e-${{ github.run_id }}

  publish:
    # Pushes the operator/sync container images. On a RELEASE, gate the image
    # push on version-consistency too, so a tag that disagrees with the manifest
    # can't ship images while release-cli + crates are blocked. On push-to-main
    # (where version-consistency is skipped) keep publishing as before.
    needs: [checks, version-consistency]
    if: >-
      ${{ always() && github.event_name != 'pull_request'
          && needs.checks.result == 'success'
          && (github.event_name != 'release' || needs['version-consistency'].result == 'success') }}
    runs-on: kunobi-runners
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version from release
        if: github.event_name == 'release'
        id: version
        env:
          TAG: ${{ github.ref_name }}
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        env:
          VERSION: ${{ steps.version.outputs.version || '0.0.0' }}
          BUILD_VERSION: ${{ github.ref_name || 'dev' }}
          BUILD_COMMIT: ${{ github.sha }}
        run: docker buildx bake -f docker-bake.hcl push

  # Fail-closed version gate: on a release, the tag must agree with the
  # workspace manifest version and Chart.yaml BEFORE any binary is built,
  # signed, or published to crates.io. Hermetic (manifest reads only).
  version-consistency:
    if: github.event_name == 'release'
    runs-on: kunobi-runners
    container:
      image: rust:1.94-bookworm
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Check tag == manifests
        run: ./scripts/check-version-consistency.sh "${{ github.ref_name }}"

  # Builds the kobe CLI (the `kobectl` member's `kobe` binary) for 6 targets,
  # SIGNS them (macOS codesign+notarize, Windows code signing, Linux PGP via
  # GCP-KMS), builds the Debian .deb assets, and attaches everything to the
  # GitHub release. Consumed by:
  #   - mise (ubi) / `gh release download` / cargo-binstall — prebuilt tarballs
  #   - package-publish.yml — apt (.deb), brew (.sha256), winget (.exe)
  #
  # Mirrors kache's `release` job (same shared reusable workflow + same shared
  # Kunobi signing identity). Differences vs kache: kobe is a WORKSPACE, so
  # `build_args` scopes the cross-build to `-p kobectl --bin kobe` (this also
  # keeps the operator's `aws-lc-sys` out of the Windows tree, which is what
  # makes the msvc cross-build viable), and `deb_package: kobectl` tells
  # cargo-deb which member to package.
  #
  # Pinned to _workflows@v11 — the first tag carrying the generic-deb change
  # (Zondax/_workflows#109: `deb_package` input + binary_name-based deb naming,
  # which defaults to kache so the change is a strict no-op for existing
  # consumers). This job will not function until that PR is merged and v11 is cut.
  release-cli:
    if: github.event_name == 'release'
    needs: [checks, version-consistency]
    uses: zondax/_workflows/.github/workflows/_release-rust.yml@v11
    with:
      binary_name: kobe
      build_args: -p kobectl --bin kobe
      deb_package: kobectl
      # Build .deb assets (kobe_<version>_{amd64,arm64}.deb) for the apt repo.
      build_deb: true
      # Publish the bare signed kobe.exe per Windows arch (kobe-<triple>-pc-windows-msvc.exe)
      # as a first-class asset so winget installs it as InstallerType: portable.
      upload_windows_exe: true
      # 6 targets incl. both Windows msvc arches, cross-built on Linux via
      # cargo-xwin (no native Windows runner). The slim kobectl tree uses the
      # `ring` rustls provider (NOT aws-lc-sys), so the arm64 msvc build links.
      targets: '["x86_64-unknown-linux-musl", "aarch64-unknown-linux-musl", "aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-pc-windows-msvc", "aarch64-pc-windows-msvc"]'
      extra_build_env: |
        BUILD_VERSION=${{ github.ref_name }}
        BUILD_COMMIT=${{ github.sha }}
        # Statically link the MSVC CRT so the .exe runs without the VC++
        # Redistributable (winget validation VMs lack it). Applied per-triple.
        CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_RUSTFLAGS=-C target-feature=+crt-static
        CARGO_TARGET_AARCH64_PC_WINDOWS_MSVC_RUSTFLAGS=-C target-feature=+crt-static
      # --- GCP-KMS code signing (reuses the shared CODESIGN_*/PGP_SIGN_* identity) ---
      enable_signing: true
      notarize_macos: true
      jsign_sha256: ${{ vars.JSIGN_SHA256 }}
      rcodesign_sha256: ${{ vars.RCODESIGN_SHA256 }}
    secrets:
      pgp_cert_base64: ${{ secrets.PGP_CERT_BASE64 }}
      pgp_signer_token: ${{ secrets.GH_PAT_KUNOBI_NINJA_RELEASES }}
      windows_cert_chain: ${{ secrets.CODESIGN_CERT_CHAIN }}
      codesign_wif_provider: ${{ secrets.CODESIGN_WIF_PROVIDER }}
      codesign_gcp_project: ${{ secrets.CODESIGN_GCP_PROJECT }}
      codesign_service_account: ${{ secrets.CODESIGN_SERVICE_ACCOUNT }}
      codesign_kms_keyring: ${{ secrets.CODESIGN_KMS_KEYRING }}
      codesign_kms_key_alias: ${{ secrets.CODESIGN_KMS_KEY_ALIAS }}
      pgp_sign_wif_provider: ${{ secrets.PGP_SIGN_WIF_PROVIDER }}
      pgp_sign_gcp_project_id: ${{ secrets.PGP_SIGN_GCP_PROJECT_ID }}
      pgp_sign_service_account: ${{ secrets.PGP_SIGN_SERVICE_ACCOUNT }}
      pgp_sign_kms_key_version: ${{ secrets.PGP_SIGN_KMS_KEY_VERSION }}
    permissions:
      contents: write
      id-token: write
