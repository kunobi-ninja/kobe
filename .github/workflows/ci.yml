name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "charts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "docker/**"
      - "docker-bake.hcl"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "src/**"
      - "charts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "docker/**"
      - "docker-bake.hcl"
      - ".github/workflows/ci.yml"
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Rust Checks
    uses: Zondax/_workflows/.github/workflows/_checks-rs.yaml@v9
    with:
      runs_on: kunobi-runners
      timeout_minutes: 35
      base_image: rust:1.93-bookworm
      enable_coverage: false
      enable_build: false
      audit_command: >-
        cargo audit
        --ignore RUSTSEC-2023-0071
        --ignore RUSTSEC-2025-0134
        --ignore RUSTSEC-2026-0002
        --ignore RUSTSEC-2026-0098
        --ignore RUSTSEC-2026-0099

  chart-checks:
    name: Chart Checks
    needs: checks
    runs-on: kunobi-runners
    container:
      image: rust:1.93-bookworm
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Verify Helm chart renders
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm dependency build charts/kobe/
          helm template kobe charts/kobe/ --debug > /dev/null

      - name: Verify CRDs match generated output
        run: |
          for crd in clusterpools clusterleases accesspolicies kobestores; do
            cargo run --quiet --bin crdgen -- "$crd" > "/tmp/${crd}-generated.yaml"
            diff -u "/tmp/${crd}-generated.yaml" "charts/kobe/crds/${crd}.yaml" || {
              echo "::error::CRD '${crd}' is out of date. Run 'cargo run --bin crdgen -- ${crd} > charts/kobe/crds/${crd}.yaml' to update."
              exit 1
            }
          done

  docker-dry-run:
    if: github.event_name == 'pull_request'
    needs: chart-checks
    runs-on: kunobi-runners
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all images (dry-run, no cache)
        run: docker buildx bake -f docker-bake.hcl --set '*.cache-from='

  publish:
    if: github.event_name != 'pull_request'
    needs: chart-checks
    uses: Zondax/_workflows/.github/workflows/_publish-docker-bake.yaml@v9
    with:
      runner: kunobi-runners
      timeout_minutes: 20
      bake_file: docker-bake.hcl
      bake_targets: operator-push,kobe-sync-push
      platforms: linux/amd64
    secrets:
      DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USER }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
