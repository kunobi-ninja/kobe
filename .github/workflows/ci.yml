name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "charts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "docker/**"
      - "docker-bake.hcl"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "src/**"
      - "charts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "docker/**"
      - "docker-bake.hcl"
      - ".github/workflows/ci.yml"
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Rust Checks
    runs-on: kunobi-runners
    container:
      image: rust:1.93-bookworm
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Add Rust components
        run: rustup component add rustfmt clippy

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Tests
        run: cargo test

      - name: Security audit
        run: |
          cargo install cargo-audit --locked || true
          cargo audit \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2025-0134 \
            --ignore RUSTSEC-2026-0037 \
            --ignore RUSTSEC-2026-0044 \
            --ignore RUSTSEC-2026-0045 \
            --ignore RUSTSEC-2026-0046 \
            --ignore RUSTSEC-2026-0047 \
            --ignore RUSTSEC-2026-0048 \
            --ignore RUSTSEC-2026-0049

  docker-dry-run:
    if: github.event_name == 'pull_request'
    needs: checks
    runs-on: kunobi-runners
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all images (dry-run, no cache)
        run: docker buildx bake -f docker-bake.hcl --set '*.cache-from='

  publish:
    if: github.event_name != 'pull_request'
    needs: checks
    runs-on: kunobi-runners
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version from release
        if: github.event_name == 'release'
        id: version
        env:
          TAG: ${{ github.ref_name }}
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        env:
          VERSION: ${{ steps.version.outputs.version || '0.0.0' }}
          BUILD_COMMIT: ${{ github.sha }}
        run: docker buildx bake -f docker-bake.hcl push
