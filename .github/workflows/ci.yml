name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "charts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "docker/**"
      - "docker-bake.hcl"
      - "hack/**"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "src/**"
      - "charts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "docker/**"
      - "docker-bake.hcl"
      - "hack/**"
      - ".github/workflows/ci.yml"
  release:
    types: [published]
  workflow_dispatch:
  # Nightly trigger for the slow privileged-k3s e2e gate (see the `e2e` job).
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Rust Checks
    runs-on: kunobi-runners
    container:
      # Toolchain floor is driven by `kunobi-ha` (≥ 1.94 since kunobi-ha
      # repointed its MSRV in their #6). Bump together with that crate
      # whenever a newer stable lands; kobe itself only requires the
      # `rust-version` declared in Cargo.toml.
      image: rust:1.94-bookworm
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Add Rust components
        run: rustup component add rustfmt clippy

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Tests
        run: cargo test

      - name: Security audit
        run: |
          cargo install cargo-audit --locked || true
          cargo audit \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2024-0436 \
            --ignore RUSTSEC-2025-0134 \
            --ignore RUSTSEC-2026-0002 \
            --ignore RUSTSEC-2026-0097 \
            --ignore RUSTSEC-2026-0098 \
            --ignore RUSTSEC-2026-0099 \
            --ignore RUSTSEC-2026-0104

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Verify Helm chart renders
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm dependency build charts/kobe/
          helm template kobe charts/kobe/ --debug > /dev/null

      - name: Verify CRDs match generated output
        run: |
          for crd in clusterpools clusterleases accesspolicies kobestores cidrpools; do
            cargo run --quiet --bin crdgen -- "$crd" > "/tmp/${crd}-generated.yaml"
            diff -u "/tmp/${crd}-generated.yaml" "charts/kobe/crds/${crd}.yaml" || {
              echo "::error::CRD '${crd}' is out of date. Run 'cargo run --bin crdgen -- ${crd} > charts/kobe/crds/${crd}.yaml' to update."
              exit 1
            }
          done

  docker-dry-run:
    if: github.event_name == 'pull_request'
    needs: checks
    runs-on: kunobi-runners
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all images (dry-run, no cache)
        run: docker buildx bake -f docker-bake.hcl --set '*.cache-from='

  # Provision→Ready→recycle smoke gate against a REAL single-server k3s cluster
  # running nested-in-pod inside plain kind, with the operator installed via the
  # real Helm chart (so its real rbac.yaml is in effect). Catches two regression
  # classes unit tests can't see: the k3s readiness-probe class (members never
  # go Ready) and the RBAC-403 recycle-wedge class (instances stuck Recycling).
  #
  # PHASE 1: nightly + manual ONLY — slow and new, not yet a PR-required check.
  # No `container:` block: like `docker-dry-run`, this needs the host Docker
  # socket for kind + buildx, so it runs directly on the self-hosted runner.
  e2e:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    needs: [checks]
    runs-on: kunobi-runners
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # Provides bun + helm + kind + just (and rust, per mise.toml). The e2e
      # harness resolves these via `mise which`, and `just` runs the recipe.
      - name: Set up mise tools
        uses: jdx/mise-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Parameterize the kind cluster name with the run id so concurrent/
      # persistent self-hosted runs never collide on a shared cluster name.
      - name: Bring up the e2e harness (kind + chart + pools)
        run: mise exec -- bun run ./hack/e2e.ts up --cluster e2e-${{ github.run_id }}

      - name: Run the k3s provision→Ready→recycle smoke gate
        run: mise exec -- just test-smoke-k3s e2e-${{ github.run_id }}

      - name: Diagnostics on failure
        if: failure()
        run: |
          CTX=kind-e2e-${{ github.run_id }}
          kubectl --context "$CTX" get pods,clusterinstances,clusterpools -A -o wide || true
          kubectl --context "$CTX" logs -n kobe-system -l app.kubernetes.io/name=kobe --tail 200 --all-containers || true
          mkdir -p /tmp/kind-logs
          mise exec -- kind export logs /tmp/kind-logs --name e2e-${{ github.run_id }} || true

      - name: Upload kind logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kind-logs-${{ github.run_id }}
          path: /tmp/kind-logs
          if-no-files-found: ignore

      # Always tear down so kind clusters never leak on the persistent runner.
      - name: Tear down the e2e harness
        if: always()
        run: mise exec -- bun run ./hack/e2e.ts down --cluster e2e-${{ github.run_id }}

  publish:
    if: github.event_name != 'pull_request'
    needs: checks
    runs-on: kunobi-runners
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version from release
        if: github.event_name == 'release'
        id: version
        env:
          TAG: ${{ github.ref_name }}
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        env:
          VERSION: ${{ steps.version.outputs.version || '0.0.0' }}
          BUILD_VERSION: ${{ github.ref_name || 'dev' }}
          BUILD_COMMIT: ${{ github.sha }}
        run: docker buildx bake -f docker-bake.hcl push

  # Builds the kobe CLI for multiple targets and attaches the tarballs to
  # the GitHub release as assets, so downstream tooling can install via
  # `mise` (ubi backend) or `gh release download` in seconds instead of
  # `cargo install --git`, which forces every consumer to compile from
  # source on every CI run.
  #
  # Mirrors the pattern kache (also in this org) uses — same shared
  # reusable workflow, same asset-naming convention. Asset names follow
  # `kobe-<target>.tar.gz` (e.g. `kobe-x86_64-unknown-linux-musl.tar.gz`)
  # which `ubi` resolves automatically by the consumer's host triple.
  #
  # `extra_build_env` stamps the binary with the release tag so
  # `kobe --version` reports the actual release; consumed by `build.rs`.
  release-cli:
    if: github.event_name == 'release'
    needs: [checks]
    uses: zondax/_workflows/.github/workflows/_release-rust.yml@main
    with:
      binary_name: kobe
      # Match kache's target set exactly — drop x86_64-pc-windows-gnu.
      # The Windows GNU cross-compile against Rust 1.94's std fails to
      # link `GetHostNameW` (a Win32 API symbol newer std hostname code
      # depends on), which mingw doesn't pull in via -lws2_32 by default
      # — v0.12.3's release-cli job hit this and aborted. We have no
      # Windows kobe consumer (Linux CI runners + macOS dev laptops only),
      # so dropping the target is correct, not just expedient.
      targets: '["x86_64-unknown-linux-musl", "aarch64-unknown-linux-musl", "aarch64-apple-darwin", "x86_64-apple-darwin"]'
      extra_build_env: |
        BUILD_VERSION=${{ github.ref_name }}
        BUILD_COMMIT=${{ github.sha }}
    permissions:
      contents: write
